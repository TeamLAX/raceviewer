<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baker-to-Vegas | Team LAX 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400..900&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" async></script>
  <style>
    :root {
      --side-margin: 2.5rem;
      --grid-cols: 5;
      --card-gap: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Lexend Deca', sans-serif;
      background: linear-gradient(135deg, #3b2416 0%, #7a3a12 50%, #2f1b13 100%);
      color: #fff;
    }
    h1, .leg-label { font-family: 'Gabarito', sans-serif; }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      padding: 2rem var(--side-margin) 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .header-info { flex: 1; min-width: 260px; }
    .header h1 {
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .header h1 span { color: #f59e0b; }
    .captain {
      margin-top: 0.5rem;
      font-size: 1.1rem;
      font-weight: 300;
      color: #fbbf24;
      letter-spacing: 0.04em;
    }

    /* Bottom cards wrapper — scales both cards together */
    .bottom-cards-wrap {
      margin: 0 var(--side-margin);
      flex-shrink: 0;
      transform: scale(1.5);
      transform-origin: bottom left;
      margin-bottom: 20px;
      width: fit-content;
    }

    /* Stopwatch card — spans over active panel */
    .total-time-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 0.6rem 1.6rem;
      backdrop-filter: blur(6px);
      margin-bottom: 5px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      white-space: nowrap;
    }
    .total-time-card .total-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #fdba74;
      flex-shrink: 0;
    }
    .total-time-card .total-value {
      font-family: 'Gabarito', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    /* Halfway — flashing checkered flag pattern on left half of distance field */
    .halfway-active-distance {
      position: relative;
      overflow: visible;
      z-index: 1;
    }
    .halfway-active-distance::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 50%;
      background: 
        repeating-conic-gradient(#fff 0% 25%, transparent 0% 50%) 
        0 0 / 8px 8px;
      opacity: 0;
      border-radius: 3px;
      z-index: -1;
      animation: halfwayFlash 2.25s infinite;
      clip-path: inset(0 0 0 0 round 3px);
    }
    @keyframes halfwayFlash {
      0%, 66.7% { opacity: 0.35; }
      66.7%, 100% { opacity: 0; }
    }

    /* Active runner panel — left-aligned above cards */
    .active-panel {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 1.2rem 1.6rem;
      width: fit-content;
      backdrop-filter: blur(6px);
      display: flex;
      gap: 14px;
      align-items: stretch;
    }
    .active-info {
      display: flex;
      flex-direction: column;
    }
    .active-panel .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #fdba74;
      margin-bottom: 0.25rem;
    }
    .active-panel .active-name {
      font-family: 'Gabarito', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.1;
    }
    .active-panel .active-leg {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #fdba74;
      margin-top: 2px;
    }
    .active-panel .start-time { font-size: 0.7rem; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .active-stats {
      display: flex;
      gap: 6px;
      align-items: flex-end;
      margin-top: auto;
    }
    .active-stats .stat-box { text-align: center; }
    .active-stats .stat-label {
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2px;
    }
    .active-stats .stat-value {
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 600;
      font-size: 0.65rem;
      padding: 2px 5px;
      border-radius: 3px;
    }
    .active-stats .gauge-wrap {
      flex-shrink: 0;
      margin-left: -3px;
    }
    .active-stats .gauge-bar {
      width: 5px;
      height: 28px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .active-stats .gauge-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      border-radius: 3px;
    }
    .active-photo-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .active-photo {
      width: 89px;
      height: 89px;
      border-radius: 6px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.4);
      display: block;
    }
    .pulse-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
    @keyframes mapMarkerPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.6), 0 2px 6px rgba(0,0,0,0.5); transform: scale(1); }
      50% { box-shadow: 0 0 0 12px rgba(245, 158, 11, 0), 0 2px 6px rgba(0,0,0,0.5); transform: scale(1.1); }
    }

    /* ── Grid carousel area — pinned to bottom ── */
    .grid-viewport {
      padding: 0 var(--side-margin);
      margin-bottom: 30px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .grid-track {
      display: grid;
      grid-template-columns: repeat(var(--grid-cols), 1fr);
      gap: var(--card-gap);
      transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 5px 10px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background 0.2s;
    }
    .card:hover { background: rgba(255,255,255,0.12); }

    /* Card top: photo left, leg/name right */
    .card-top {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .card-photo-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .card-photo {
      width: 77px;
      height: 77px;
      border-radius: 6px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.4);
      display: block;
    }
    /* Police badge beneath photo */
    .card-badge-row {
      margin-top: -4px;
      position: relative;
      z-index: 1;
    }
    .police-badge {
      position: relative;
      width: 22px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .police-badge .badge-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
    }
    .police-badge .badge-yrs {
      position: relative;
      z-index: 1;
      font-family: 'Gabarito', sans-serif;
      font-size: 0.6rem;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      margin-top: 10px;
      text-shadow: 0 0 4px rgba(0,0,0,1), 0 0 8px rgba(0,0,0,0.9), 0 1px 2px rgba(0,0,0,0.8);
    }
    .police-badge .badge-label {
      position: relative;
      z-index: 1;
      font-size: 0.35rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #fff;
      line-height: 1;
      text-shadow: 0 0 4px rgba(0,0,0,1), 0 0 8px rgba(0,0,0,0.9);
    }

    /* Active panel badge */
    .active-badge-row {
      margin-top: -4px;
      position: relative;
      z-index: 1;
    }
    .active-badge-row .police-badge {
      width: 28px;
      height: 40px;
    }
    .active-badge-row .badge-yrs {
      font-size: 0.72rem;
      margin-top: 14px;
    }
    .active-badge-row .badge-label {
      font-size: 0.38rem;
    }

    /* Overlay badge */
    .overlay-badge-row .police-badge {
      width: 42px;
      height: 60px;
    }
    .overlay-badge-row .badge-yrs {
      font-size: 1.05rem;
      margin-top: 20px;
    }
    .overlay-badge-row .badge-label {
      font-size: 0.5rem;
    }

    /* Identity: leg at top, name at bottom — spans photo height */
    .card-identity {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 77px; /* match photo */
    }
    .card-leg {
      font-family: 'Gabarito', sans-serif;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #fdba74;
      line-height: 1;
    }
    .card-name {
      font-family: 'Gabarito', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      white-space: normal;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.15;
      text-align: left;
    }

    /* ── Stats row ── */
    .card-stats {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-box {
      text-align: center;
      flex: 1;
    }
    .stat-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2px;
    }
    .stat-value {
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 3px 6px;
      border-radius: 4px;
    }

    /* Gauge — no label, positioned near Distance */
    .gauge-wrap {
      flex-shrink: 0;
      margin-left: -3px;
    }
    .gauge-bar {
      width: 6px;
      height: 36px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .gauge-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      border-radius: 3px;
      transition: height 0.3s;
    }

    @media (max-width: 1100px) { :root { --grid-cols: 4; } }
    @media (max-width: 860px)  {
      :root { --grid-cols: 3; }
      .bottom-cards-wrap { transform: scale(1.2); }
    }
    @media (max-width: 600px)  {
      :root { --grid-cols: 2; }
      
      /* Full page scrollable on mobile */
      html, body { overflow: auto; height: auto; }
      #app {
        height: auto;
        flex-direction: column;
        min-height: 100vh;
        overflow: visible;
        display: block;
      }
      
      /* Title: sticky at very top */
      .header {
        padding: 0.6rem var(--side-margin) 0.4rem;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 30;
        background: linear-gradient(135deg, #3b2416 0%, #7a3a12 50%, #2f1b13 100%);
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      .header h1 { font-size: 1.3rem; line-height: 1.2; }
      .header h1 span.pipe { display: none; }
      .header h1 .title-team { display: block; margin-top: 2px; }
      .captain { display: none; }
      
      /* Hide flex spacer */
      .flex-spacer { display: none; }
      
      /* Remove transform on wrap — breaks sticky */
      .bottom-cards-wrap {
        transform: none !important;
        margin: 0;
        padding: 0;
        width: 100%;
      }
      
      /* Stopwatch sticky below header */
      .total-time-card {
        position: sticky;
        top: 48px;
        z-index: 20;
        background: rgba(43,28,16,0.97);
        backdrop-filter: blur(10px);
        border-radius: 0;
        border: none;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        margin: 0;
        padding: 0.5rem var(--side-margin);
        width: 100%;
      }
      
      /* Active panel — prominent full-width card on mobile */
      .active-panel {
        display: flex;
        padding: 14px 16px;
        gap: 12px;
        width: 100%;
        border-radius: 0;
        border: none;
        background: linear-gradient(135deg, rgba(245,158,11,0.08) 0%, rgba(255,255,255,0.06) 100%);
        border-top: 2px solid rgba(245,158,11,0.3);
        border-bottom: 2px solid rgba(245,158,11,0.3);
        margin: 0;
        align-items: stretch;
      }
      .active-panel .active-info {
        flex: 1;
        min-width: 0;
      }
      .active-panel .label { font-size: 0.65rem; }
      .active-panel .active-name { font-size: 1.15rem; }
      .active-panel .active-leg { font-size: 0.65rem; }
      .active-photo-col {
        flex-shrink: 0;
      }
      .active-photo {
        width: 65px !important;
        height: 65px !important;
      }
      .active-stats {
        margin-top: 6px;
      }
      .active-stats .stat-value { font-size: 0.65rem; padding: 3px 6px; }
      .active-stats .stat-label { font-size: 0.45rem; }
      
      /* Grid — natural scroll on mobile */
      .grid-viewport {
        overflow: visible;
        max-height: none;
        margin: 0;
        padding: 8px 8px 30px;
      }
      .grid-track {
        transition: none !important;
        transform: none !important;
      }
      .card {
        width: 100%;
      }
      
    }
    /* ── Sponsor Cards ── */
    .card.sponsor-card {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 5px 10px 20px;
      align-items: center;
    }
    .sponsor-card .sponsor-tag {
      font-family: 'Gabarito', sans-serif;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #fdba74;
      line-height: 1;
      align-self: center;
    }
    .sponsor-card .sponsor-logo {
      width: 77px;
      height: 77px;
      object-fit: contain;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      padding: 4px;
      margin-top: 3px;
    }
    .sponsor-card .sponsor-name {
      font-family: 'Gabarito', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      color: #fff;
      text-align: center;
      line-height: 1.15;
      white-space: normal;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* ── Sponsor Overlay ── */
    .sponsor-overlay-card {

    /* ── Alternates Card ── */
    .card.alternates-card {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 5px 10px 10px;
    }
    .alternates-card .alt-title {
      font-family: 'Gabarito', sans-serif;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #fdba74;
      line-height: 1;
      text-align: center;
      margin-bottom: 2px;
    }
    .alternates-card .alt-name {
      font-family: 'Lexend Deca', sans-serif;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.8);
      line-height: 1.5;
      text-align: center;
    }

    /* ── Alternates Overlay ── */
    .alt-overlay-card {
      position: relative;
      background: linear-gradient(135deg, #3b2416 0%, #7a3a12 50%, #2f1b13 100%);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 2rem;
      width: 90vw;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transform: scale(0.85) rotateY(180deg);
      transition: transform 0.6s ease;
      max-height: 80vh;
      overflow-y: auto;
    }
    .runner-overlay.visible .alt-overlay-card {
      transform: scale(1) rotateY(0deg);
    }
    .alt-overlay-title {
      font-family: 'Gabarito', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: #fdba74;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .alt-overlay-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .alt-overlay-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
    }
    .alt-overlay-name {
      font-family: 'Gabarito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      flex: 1;
    }
    .alt-overlay-meta {
      text-align: center;
      min-width: 50px;
      position: relative;
    }
    .alt-overlay-years {
      font-family: 'Gabarito', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: rgba(255,255,255,0.3);
      line-height: 1;
    }
    .alt-overlay-type {
      font-family: 'Gabarito', sans-serif;
      font-size: 0.45rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #f59e0b;
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    /* ── Sponsor Overlay ── */
    .sponsor-overlay-card {
      position: relative;
      background: linear-gradient(135deg, #3b2416 0%, #7a3a12 50%, #2f1b13 100%);
      border: 2px solid rgba(245,158,11,0.2);
      border-radius: 20px;
      padding: 2rem;
      width: 90vw;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transform: scale(0.85) rotateY(180deg);
      transition: transform 0.6s ease;
    }
    .runner-overlay.visible .sponsor-overlay-card {
      transform: scale(1) rotateY(0deg);
    }
    .sponsor-overlay-logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px;
    }
    .sponsor-overlay-name {
      font-family: 'Gabarito', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      text-align: center;
    }
    .sponsor-overlay-desc {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      text-align: center;
      line-height: 1.5;
      max-width: 320px;
    }
    .sponsor-overlay-link {
      display: inline-block;
      padding: 8px 20px;
      background: var(--accent, #f59e0b);
      color: #1a0f05;
      border-radius: 6px;
      text-decoration: none;
      font-family: 'Gabarito', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
    }

    /* ── Distance link styling ── */
    .distance-link {
      text-decoration: none;
    }
    .map-icon-btn {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s, transform 0.2s;
      flex-shrink: 0;
      margin: 0 7px;
      position: relative;
      z-index: 5;
    }
    .map-icon-btn:hover {
      opacity: 1;
      transform: scale(1.15);
    }

    /* ── Stage Detail Overlay ── */
    .stage-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(12px);
      z-index: 600;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s, transform 0.6s ease;
      transform: rotateY(180deg);
    }
    .stage-overlay.visible {
      opacity: 1;
      pointer-events: auto;
      transform: rotateY(0deg);
    }
    .stage-overlay-header {
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(245,158,11,0.2);
    }
    .stage-overlay-header h2 {
      font-family: 'Gabarito', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: #f59e0b;
    }
    .stage-overlay-close {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      position: relative;
      width: 40px;
      height: 40px;

// Pre-populated stage distances from B2V race guide
const STAGE_DISTANCES = {
  1:'5.4 mi', 2:'4.0 mi', 3:'4.2 mi', 4:'5.1 mi', 5:'6.1 mi',
  6:'6.1 mi', 7:'6.2 mi', 8:'6.6 mi', 9:'7.5 mi', 10:'5.8 mi',
  11:'5.3 mi', 12:'4.7 mi', 13:'6.9 mi', 14:'10.7 mi', 15:'6.4 mi',
  16:'5.8 mi', 17:'8.3 mi', 18:'6.3 mi', 19:'5.6 mi', 20:'3.2 mi'
};
// Official B2V difficulty rankings from 2026 Rule Book (page 22-26)
// 1 = most difficult (red), 10 = moderate (yellow), 20 = least difficult (green)
const STAGE_DIFFICULTY = {
  1:15,   // Flat with slight declines
  2:16,   // Slight downhill, flat
  3:8,    // Strenuous 4.2 mi climb
  4:6,    // Climb to Ibex Pass
  5:19,   // Entire stage downhill
  6:9,    // Rolling hills
  7:4,    // Arduous hill
  8:5,    // Steep last 1.6 mi
  9:7,    // Short downhill then uphill
  10:12,  // Flat into Pahrump
  11:11,  // Slight continuous incline
  12:14,  // Short steady uphill
  13:3,   // Long 5 mi incline
  14:2,   // 10.7 mi constant climb
  15:1,   // HARDEST — Mountain Springs Summit
  16:13,  // Steep descent
  17:10,  // Long continuous descent
  18:17,  // Mostly flat/slight incline
  19:20,  // EASIEST — flat urban
  20:18   // Flat to downhill
};
// ═══════════════════════════════════════════════════

let runners = Array.from({ length: 20 }, (_, i) => ({
  leg: i + 1, name: `Runner ${i + 1}`, years: '', time: '--:--',
  distance: STAGE_DISTANCES[i + 1] || '', difficulty: STAGE_DIFFICULTY[i + 1] || 10,
  start: '--:-- PDT',
  photo: FALLBACK_PHOTO, active: i === 0
}));

function getActiveRunner() {
  return runners.find(r => r.active) || runners[0];
}

function fetchRunners() {
  // Use JSONP to bypass CORS — injects a script tag
  const cbName = '_b2v_cb_' + Date.now();
  let handled = false;
  
  window[cbName] = function(data) {
    handled = true;
    delete window[cbName];
    const script = document.getElementById(cbName);
    if (script) script.remove();
    
    // DEBUG: show what clock data we received
    if (data && data.clock) {
      console.log('B2V Clock data:', JSON.stringify(data.clock));
      var dbg = document.getElementById('clockDebug');
      if (dbg) dbg.textContent = 'API: status=' + (data.clock.status||'?') + ' start=' + (data.clock.autoStartTime||'none');
    }
    
    if (data && data.status === 'ok' && data.runners && data.runners.length) {
      var newRunners = data.runners.map(r => ({
        ...r,
        photo: r.photo || FALLBACK_PHOTO,
        name: r.name || 'Runner ' + r.leg,
        time: r.time || '--:--',
        start: r.start || '--:-- PDT',
        distance: r.distance || STAGE_DISTANCES[r.leg] || '',
        difficulty: parseInt(r.difficulty) || STAGE_DIFFICULTY[r.leg] || 10
      }));
      
      // Read clock state from API
      if (data.clock) {
        const c = data.clock;
        clockStatus = c.status || 'running';
        clockAdvisory = c.advisory || '';
        clockStoppedAt = c.stoppedAt || '';
        clockConfirmedTime = c.confirmedTime || '';
        if (c.autoStartTime) {
          stopwatchStart = new Date(c.autoStartTime).getTime();
        }
      }
      // If status is stopped but has no stoppedAt, treat as running
      if (clockStatus === 'stopped' && !clockStoppedAt) {
        clockStatus = 'running';
      }
      
      // Only do full render if data actually changed (avoid destroying carousel)
      var runnersChanged = JSON.stringify(newRunners) !== JSON.stringify(runners);
      runners = newRunners;
      
      // Update active ads from API
      var newAds = [];
      if (data.ads && data.ads.length) {
        data.ads.forEach(function(ad) {
          if (ad.active && (ad.name || ad.logoUrl)) {
            newAds.push(ad);
          }
        });
      }
      var adsChanged = JSON.stringify(newAds) !== JSON.stringify(activeAds);
      activeAds = newAds;
      
      // Update alternates from API
      var newAlts = data.alternates || [];
      var altsChanged = JSON.stringify(newAlts) !== JSON.stringify(alternates);
      alternates = newAlts;
      
      if (runnersChanged || adsChanged || altsChanged || !document.getElementById('gridTrack')) {
        render();
      }
    }
  };
  
  const script = document.createElement('script');
  script.id = cbName;
  script.src = API_URL + '?callback=' + cbName + '&t=' + Date.now();
  script.onerror = function() {
    if (handled) return;
    handled = true;
    delete window[cbName];
    script.remove();
    console.log('JSONP load failed');
    var dbg = document.getElementById('clockDebug');

  // Timeout fallback — if no response in 8 seconds
  setTimeout(function() {
    if (!handled) {

      delete window[cbName];
      var s = document.getElementById(cbName);

      console.log('JSONP timeout');
      var dbg = document.getElementById('clockDebug');
      if (dbg) dbg.textContent = 'API timeout — check URL & deployment';
    }
  }, 8000);
}

function gaugeColor(d) {
  // B2V scale: 1=most difficult → 20=least difficult
  // 4 solid colors only
  d = Math.max(1, Math.min(20, d));
  if (d <= 2)  return '#D10000';  // Dark red
  if (d <= 9)  return '#FF0000';  // Red
  if (d <= 16) return '#FACC15';  // Yellow
  return '#22c55e';               // Green (17-20)
}

/* ── Stopwatch ── */
let stopwatchInterval = null;

// Check URL parameter first: ?start=2026-03-28T08:00:00-07:00
const urlParams = new URLSearchParams(window.location.search);
const urlStart = urlParams.get('start');
let stopwatchStart = urlStart ? new Date(urlStart).getTime() : new Date('2026-03-28T08:00:00-07:00').getTime();
let clockStatus = urlStart ? 'running' : 'running';
let clockConfirmedTime = '';
let clockStoppedAt = '';
let clockAdvisory = '';

function startStopwatch() {
  if (stopwatchInterval) clearInterval(stopwatchInterval);
  
  const el = document.getElementById('totalTime');
  if (!el) return;
  
  el.innerHTML = `
    <div class="total-label">Stop Watch</div>
    <div class="total-value" id="stopwatchDisplay">00:00:00.00</div>
    <div id="clockUnofficialBanner" style="display:none;font-family:Gabarito,sans-serif;font-size:1rem;font-weight:900;color:#ef4444;text-align:center;letter-spacing:0.15em;text-transform:uppercase;display:none"></div>`;
  
  var flashToggle = true;
  
  stopwatchInterval = setInterval(function() {
    var displayEl = document.getElementById('stopwatchDisplay');
    var bannerEl = document.getElementById('clockUnofficialBanner');
    if (!displayEl) return;
    
    // Confirmed — show final time in gold, hide banner
    if (clockStatus === 'confirmed' && clockConfirmedTime) {
      displayEl.textContent = clockConfirmedTime;
      displayEl.style.color = '#f59e0b';
      if (bannerEl) bannerEl.style.display = 'none';
      return;
    }
    
    // Stopped — freeze the time, flash UNOFFICIAL
    if (clockStatus === 'stopped') {
      // Calculate frozen time
      var frozenTime = clockStoppedAt;
      if (!frozenTime) {
        var frozenElapsed = Date.now() - stopwatchStart;
        if (frozenElapsed > 0) {
          var fh = Math.floor(frozenElapsed / 3600000);
          var fm = Math.floor((frozenElapsed % 3600000) / 60000);
          var fs = Math.floor((frozenElapsed % 60000) / 1000);
          frozenTime = String(fh).padStart(2,'0') + ':' + String(fm).padStart(2,'0') + ':' + String(fs).padStart(2,'0');
        } else {
          frozenTime = '00:00:00';
        }
      }
      displayEl.textContent = frozenTime;
      displayEl.style.color = '';
      
      // Flash only UNOFFICIAL — 2 sec on, 300ms off
      if (bannerEl) {
        bannerEl.style.display = 'inline';
        bannerEl.textContent = '  UNOFFICIAL';
        var cycle = Date.now() % 2300;
        bannerEl.style.opacity = cycle < 2000 ? '1' : '0';
      }
      return;
    }
    
    // Running — count up, hide banner
    displayEl.style.color = '';
    if (bannerEl) bannerEl.style.display = 'none';
    var elapsed = Date.now() - stopwatchStart;
    if (elapsed <= 0) {
      displayEl.textContent = '00:00:00.00';
      return;
    }
    var h = Math.floor(elapsed / 3600000);
    var m = Math.floor((elapsed % 3600000) / 60000);
    var s = Math.floor((elapsed % 60000) / 1000);
    var cs = Math.floor((elapsed % 1000) / 10);
    displayEl.textContent = 
      String(h).padStart(2,'0') + ':' + 
      String(m).padStart(2,'0') + ':' + 
      String(s).padStart(2,'0') + '.' + 
      String(cs).padStart(2,'0');
  }, 50);

function initCarousel() {
  const track = document.getElementById('gridTrack');
  if (!track) return;

  /* On mobile (<=600px), just let users scroll naturally — no carousel */
  if (window.innerWidth <= 600) {
    return;
  }

  const style = getComputedStyle(document.documentElement);
  const cols = parseInt(style.getPropertyValue('--grid-cols')) || 5;
  const totalCards = track.querySelectorAll('.card').length / 2; // divided by 2 because cards are doubled
  const originalRowCount = Math.ceil(totalCards / cols);
  const VISIBLE_ROWS = 2;
  const INTERVAL_MS = 20000;
  const PAUSE_AFTER_INTERACTION = 20000;

  if (originalRowCount <= VISIBLE_ROWS) return;

  const cards = track.querySelectorAll('.card');
  if (!cards.length) return;

  const gap = parseInt(style.getPropertyValue('--card-gap')) || 10;
  const rowOffset = cards[0].offsetHeight + gap;

  /* Lock viewport to exactly 2 rows */
  const viewport = track.parentElement;
  viewport.style.height = (rowOffset * VISIBLE_ROWS - gap) + 'px';
  viewport.style.overflow = 'hidden';

  let currentTopRow = 0;
  let userInteracted = false;
  let interactionTimer = null;
  const maxRow = originalRowCount * 2 - VISIBLE_ROWS; // max scroll position in the doubled set

  function onUserInteraction() {
    userInteracted = true;
    if (interactionTimer) clearTimeout(interactionTimer);
    interactionTimer = setTimeout(function() {
      userInteracted = false;
      // Reset position to first set for seamless auto-scroll resume
      if (currentTopRow >= originalRowCount) {
        track.style.transition = 'none';
        currentTopRow = currentTopRow - originalRowCount;
        track.style.transform = 'translateY(-' + (currentTopRow * rowOffset) + 'px)';
      }
    }, PAUSE_AFTER_INTERACTION);
  }

  // Manual scroll via mouse wheel — smooth, no snap
  viewport.addEventListener('wheel', function(e) {
    e.preventDefault();
    onUserInteraction();
    if (e.deltaY > 0) {
      currentTopRow++;
    } else {
      currentTopRow--;
    }
    // Clamp within the doubled range
    if (currentTopRow < 0) currentTopRow = 0;
    if (currentTopRow > maxRow) currentTopRow = maxRow;
    track.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
    track.style.transform = 'translateY(-' + (currentTopRow * rowOffset) + 'px)';
  }, { passive: false });

  // Manual scroll via touch swipe
  let touchStartY = 0;
  let touchMoved = false;
  viewport.addEventListener('touchstart', function(e) {
    touchStartY = e.touches[0].clientY;
    touchMoved = false;
    onUserInteraction();
  }, { passive: true });
  viewport.addEventListener('touchmove', function(e) {
    touchMoved = true;
  }, { passive: true });
  viewport.addEventListener('touchend', function(e) {
    if (!touchMoved) return;
    var diff = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(diff) > 30) {
      if (diff > 0) {
        currentTopRow++;
      } else {
        currentTopRow--;
      }
      if (currentTopRow < 0) currentTopRow = 0;
      if (currentTopRow > maxRow) currentTopRow = maxRow;
      track.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
      track.style.transform = 'translateY(-' + (currentTopRow * rowOffset) + 'px)';
    }
  }, { passive: true });

  carouselTimer = setInterval(() => {
    // Skip auto-scroll if user recently interacted
    if (userInteracted) return;

    currentTopRow++;

    /* When we've scrolled past all original rows, seamlessly jump back */
    if (currentTopRow >= originalRowCount) {
      track.style.transition = 'none';
      track.style.transform = 'translateY(0)';
      currentTopRow = 0;
      /* Let the jump render, then re-enable transition and advance */
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          currentTopRow = 1;
          track.style.transition = 'transform 0.9s cubic-bezier(0.4, 0, 0.2, 1)';
          track.style.transform = `translateY(-${currentTopRow * rowOffset}px)`;
        });
      });
      return;
    }

    track.style.transition = 'transform 0.9s cubic-bezier(0.4, 0, 0.2, 1)';
    track.style.transform = `translateY(-${currentTopRow * rowOffset}px)`;
  }, INTERVAL_MS);
}

render();

function openRunnerOverlay(leg) {
  try {

  // Calculate pace (min/mile) from time and distance

  if (r.time && r.time !== '--:--' && r.distance) {
    const distNum = parseFloat(r.distance);
    if (distNum > 0) {
      const timeParts = r.time.split(':');
      let totalMins = 0;
      if (timeParts.length === 2) totalMins = parseInt(timeParts[0]) + parseInt(timeParts[1]) / 60;
      if (timeParts.length === 3) totalMins = parseInt(timeParts[0]) * 60 + parseInt(timeParts[1]) + parseInt(timeParts[2]) / 60;
      const pace = totalMins / distNum;
      const paceMins = Math.floor(pace);
      const paceSecs = Math.round((pace - paceMins) * 60);
      paceDisplay = paceMins + ':' + String(paceSecs).padStart(2, '0') + '/mi';

  // Stage elevations from B2V PDF (start elevation in feet)
  const STAGE_ELEVATIONS = {

    16:5400, 17:3760, 18:2842, 19:2640, 20:2315
  };
  const elevation = r.elevation || STAGE_ELEVATIONS[r.leg] || '';
  const elevDisplay = elevation ? Number(elevation).toLocaleString() + ' ft' : '—';
  
  overlay.innerHTML = `

        </svg>
        <span class="close-x">✕</span>
      </button>
      <div class="overlay-leg">Stage ${r.leg}</div>
      <img src="${r.photo}" alt="${r.name}" class="overlay-photo" />
      <div class="overlay-name">${r.name}</div>
      <div class="overlay-badge-row">
        ${makeBadge(yearsDisplay)}
      </div>
      <div class="overlay-stats-grid">
        <div class="overlay-stat">
          <div class="stat-label">Distance</div>
          <div class="stat-value">${r.distance || '—'}</div>
        </div>
        <div class="overlay-stat">
          <div class="stat-label">Difficulty</div>
          <div class="stat-value" style="position:relative;overflow:hidden;color:#fff;font-weight:800;text-shadow:0 1px 2px rgba(0,0,0,0.5);z-index:1"><span style="position:absolute;top:0;left:0;bottom:0;width:${(21 - r.difficulty) * 5}%;background:linear-gradient(105deg, ${gaugeColor(r.difficulty)} 70%, transparent 100%);z-index:-1;border-radius:3px"></span>${r.difficulty}</div>
        </div>
        <div class="overlay-stat">
          <div class="stat-label">Run Time</div>
          <div class="stat-value">${r.time || '—'}</div>
        </div>
        <div class="overlay-stat">
          <div class="stat-label">Pace</div>
          <div class="stat-value">${paceDisplay}</div>
        </div>
        <div class="overlay-stat">
          <div class="stat-label">Started</div>
          <div class="stat-value">${r.start || '—'}</div>
        </div>
        <div class="overlay-stat">
          <div class="stat-label">Elevation</div>
          <div class="stat-value">${elevDisplay}</div>
        </div>
      </div>
      <div class="overlay-timer">
        <div class="overlay-timer-bar" id="overlayTimerBar"></div>
      </div>
    </div>`;
  
  overlay.classList.add('visible');
  
  // Start countdown ring and bar
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const bar = document.getElementById('overlayTimerBar');
      if (bar) bar.classList.add('running');
      const ring = document.getElementById('overlayCountdownRing');
      if (ring) ring.classList.add('running');
    });
  });
  
  // Auto-close after 22 seconds
  if (overlayTimer) clearTimeout(overlayTimer);
  overlayTimer = setTimeout(closeOverlay, 22000);
  } catch(e) { alert('Overlay error: ' + e.message); }
}

function closeOverlay() {
  if (overlayTimer) { clearTimeout(overlayTimer); overlayTimer = null; }
  const ring = document.getElementById('overlayCountdownRing');
  if (ring) ring.classList.remove('running');
  const overlay = document.getElementById('runnerOverlay');
  overlay.classList.remove('visible');
}

/* ── Stage Detail Overlay ── */
let stageMap = null;
let stageFlashInterval = null;
let stageDetailTimer = null;

function openStageDetail(leg) {
  leg = parseInt(leg);
  console.log('openStageDetail called for leg', leg);
  if (typeof L === 'undefined') { 
    alert('Map is still loading, try again in a moment.'); 
    return; 
  }
  const stage = stageData[leg];
  if (!stage) { console.log('No stage data for leg', leg); return; }
  
  // Clear any existing auto-close timer
  if (stageDetailTimer) { clearTimeout(stageDetailTimer); stageDetailTimer = null; }
  
  const overlay = document.getElementById('stageOverlay');
  
  // Get the runner for this stage
  const stageRunner = runners.find(r => r.leg === leg) || {};
  const firstName = (stageRunner.name || 'Runner').split(' ')[0];
  const runnerPhoto = stageRunner.photo || FALLBACK_PHOTO;
  
  document.getElementById('stageOverlayTitle').innerHTML = 
    '<div style="display:flex;align-items:center;gap:10px">' +
    '<span>Stage ' + leg + '</span>' +
    '<img src="' + runnerPhoto + '" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.4)" />' +
    '<span style="font-size:0.85rem;color:rgba(255,255,255,0.8);font-weight:400">' + firstName + '\'s Run Leg Details</span>' +
    '</div>';
  
  document.getElementById('stageInfoBar').innerHTML = `
    <div class="stage-info-grid">
      <div class="stage-info-item">
        <div class="si-label">Distance</div>
        <div class="si-value">${stage.dist}</div>
      </div>
      <div class="stage-info-item">
        <div class="si-label">Elevation</div>
        <div class="si-value">${stage.elev}</div>
      </div>
      <div class="stage-info-item">
        <div class="si-label">Terrain</div>
        <div class="si-value">${stage.diff}</div>
      </div>
    </div>
    <div class="stage-desc-text">${stage.desc}</div>
    <div class="stage-gps-text">GPS: ${stage.gps}</div>`;
  
  overlay.classList.add('visible');
  
  // Start circular countdown ring
  const ring = document.getElementById('countdownRing');
  if (ring) {
    ring.classList.remove('running');
    void ring.offsetWidth;
    requestAnimationFrame(() => {
      ring.classList.add('running');
    });
  }
  
  // Initialize or update the map after overlay is visible
  setTimeout(() => {
    if (stageMap) {
      stageMap.remove();
      stageMap = null;
    }
    if (stageFlashInterval) { clearInterval(stageFlashInterval); stageFlashInterval = null; }
    
    stageMap = L.map('stageMap', {
      center: [stage.lat, stage.lng],
      zoom: 14,
      zoomControl: true
    });
    
    L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
      maxZoom: 17,
      attribution: '© OpenTopoMap'
    }).addTo(stageMap);
    
    // Fetch road-following route segment by segment via OSRM
    async function loadRouteSegments() {
      
      for (let i = 1; i < 20; i++) {
        if (!stageData[i] || !stageData[i + 1]) continue;
        const from = stageData[i];
        const to = stageData[i + 1];
        const url = 'https://router.project-osrm.org/route/v1/driving/' +
          from.lng + ',' + from.lat + ';' + to.lng + ',' + to.lat +
          '?overview=full&geometries=geojson';
        
        try {
          const res = await fetch(url);
          const data = await res.json();
          if (data.routes && data.routes[0]) {
            const segCoords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
            
            const isActiveSeg = (i === leg);
            if (isActiveSeg) {
              // Active segment — flashing red
              const activeLine = L.polyline(segCoords, {
                color: '#ff3333', weight: 5, opacity: 0.9
              }).addTo(stageMap);
              let flashVisible = true;
              stageFlashInterval = setInterval(() => {
                flashVisible = !flashVisible;
                activeLine.setStyle({ opacity: flashVisible ? 0.9 : 0 });
              }, 1500);
            } else {
              // Non-active — solid gold route line
              L.polyline(segCoords, {
                color: '#f59e0b', weight: 3, opacity: 0.5
              }).addTo(stageMap);
            }
          }
        } catch (e) {
          // Fallback straight line for this segment
          L.polyline([[from.lat, from.lng], [to.lat, to.lng]], {
            color: '#f59e0b', weight: 2, opacity: 0.2, dashArray: '4,6'
          }).addTo(stageMap);
        }
        
        // Small delay to avoid OSRM rate limits
        await new Promise(r => setTimeout(r, 200));
      }
    }
    loadRouteSegments();
    
    // Add numbered markers for ALL stages
    for (let i = 1; i <= 20; i++) {
      if (!stageData[i]) continue;
      const s = stageData[i];
      const isCurrentStage = (i === leg);
      const mColor = i === 1 ? '#22c55e' : i === 20 ? '#ef4444' : (isCurrentStage ? '#f59e0b' : 'rgba(60,40,20,0.85)');
      const mSize = isCurrentStage ? 34 : 22;
      const mFont = isCurrentStage ? '14px' : '9px';
      const mBorder = isCurrentStage ? '3px solid #fff' : '2px solid rgba(255,255,255,0.5)';
      const mColor2 = isCurrentStage ? '#1a0f05' : '#fff';
      const pulseAnim = isCurrentStage ? 'animation:mapMarkerPulse 1.4s infinite;' : '';
      const mShadow = 'box-shadow:0 2px 6px rgba(0,0,0,0.5);';
      
      L.marker([s.lat, s.lng], {
        icon: L.divIcon({
          className: '',
          html: '<div style="background:' + mColor + ';color:' + mColor2 + ';font-family:Gabarito,sans-serif;font-weight:800;font-size:' + mFont + ';width:' + mSize + 'px;height:' + mSize + 'px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:' + mBorder + ';' + mShadow + pulseAnim + '">' + i + '</div>',
          iconSize: [mSize, mSize],
          iconAnchor: [mSize/2, mSize/2]
        })
      }).addTo(stageMap);
    }
    
    // Fit map to current stage context
    if (leg < 20 && stageData[leg + 1]) {
      const nextStage = stageData[leg + 1];
      stageMap.fitBounds([
        [stage.lat, stage.lng],
        [nextStage.lat, nextStage.lng]
      ], { padding: [60, 60] });
    } else {
      stageMap.setView([stage.lat, stage.lng], 13);
    }
    
    stageMap.invalidateSize();
  }, 100);
  
  // Auto-close after 1 min 30 sec (90 seconds)
  stageDetailTimer = setTimeout(closeStageDetail, 90000);
}

function closeStageDetail() {
  if (stageDetailTimer) { clearTimeout(stageDetailTimer); stageDetailTimer = null; }
  document.getElementById('stageOverlay').classList.remove('visible');
  const ring = document.getElementById('countdownRing');
  if (ring) ring.classList.remove('running');
  if (stageFlashInterval) { clearInterval(stageFlashInterval); stageFlashInterval = null; }
  if (stageMap) {
    stageMap.remove();
    stageMap = null;
  }
}
