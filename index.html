<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baker-to-Vegas | Team LAX 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400..900&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --side-margin: 2.5rem;
      --grid-cols: 5;
      --card-gap: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Lexend Deca', sans-serif;
      background: linear-gradient(135deg, #3b2416 0%, #7a3a12 50%, #2f1b13 100%);
      color: #fff;
    }
    h1, .leg-label { font-family: 'Gabarito', sans-serif; }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      padding: 2rem var(--side-margin) 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .header-info { flex: 1; min-width: 260px; }
    .header h1 {
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .header h1 span { color: #f59e0b; }
    .captain {
      margin-top: 0.5rem;
      font-size: 1.1rem;
      font-weight: 300;
      color: #fbbf24;
      letter-spacing: 0.04em;
    }

    /* Bottom cards wrapper — scales both cards together */
    .bottom-cards-wrap {
      margin: 0 var(--side-margin);
      flex-shrink: 0;
      transform: scale(1.5);
      transform-origin: bottom left;
      margin-bottom: 20px;
      width: fit-content;
    }

    /* Stopwatch card — spans over active panel */
    .total-time-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 0.6rem 1.6rem;
      backdrop-filter: blur(6px);
      margin-bottom: 5px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      white-space: nowrap;
    }
    .total-time-card .total-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #fdba74;
      flex-shrink: 0;
    }
    .total-time-card .total-value {
      font-family: 'Gabarito', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    /* Halfway split-flap effect on Running Since value */
    .halfway-split {
      position: relative;
      overflow: hidden;
      background: linear-gradient(to bottom, #f59e0b 50%, rgba(255,255,255,0.12) 50%) !important;
      color: transparent !important;
      -webkit-background-clip: text;
      background-clip: text;
    }
    /* Fallback for browsers that don't support background-clip:text well */
    @supports not (-webkit-background-clip: text) {
      .halfway-split {
        color: #f59e0b !important;
        background: linear-gradient(to bottom, rgba(255,255,255,0.12) 50%, #f59e0b 50%) !important;
      }
    }
    .stat-value.halfway-split {
      position: relative;
      color: #fff !important;
      background: none !important;
      -webkit-background-clip: unset;
      background-clip: unset;
      overflow: hidden;
    }
    .stat-value.halfway-split::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: #f59e0b;
      border-radius: 4px 4px 0 0;
      z-index: -1;
    }
    .stat-value.halfway-split::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50%;
      background: rgba(255,255,255,0.12);
      border-radius: 0 0 4px 4px;
      z-index: -1;
    }

    /* Active runner panel — left-aligned above cards */
    .active-panel {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 1.2rem 1.6rem;
      width: fit-content;
      backdrop-filter: blur(6px);
      display: flex;
      gap: 14px;
      align-items: stretch;
    }
    .active-info {
      display: flex;
      flex-direction: column;
    }
    .active-panel .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #fdba74;
      margin-bottom: 0.25rem;
    }
    .active-panel .active-name {
      font-family: 'Gabarito', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.1;
    }
    .active-panel .active-leg {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #fdba74;
      margin-top: 2px;
    }
    .active-panel .start-time { font-size: 0.7rem; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .active-stats {
      display: flex;
      gap: 6px;
      align-items: flex-end;
      margin-top: auto;
    }
    .active-stats .stat-box { text-align: center; }
    .active-stats .stat-label {
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2px;
    }
    .active-stats .stat-value {
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 600;
      font-size: 0.65rem;
      padding: 2px 5px;
      border-radius: 3px;
    }
    .active-stats .gauge-wrap {
      flex-shrink: 0;
      margin-left: -3px;
    }
    .active-stats .gauge-bar {
      width: 5px;
      height: 28px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .active-stats .gauge-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      border-radius: 3px;
    }
    .active-photo-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .active-photo {
      width: 89px;
      height: 89px;
      border-radius: 6px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.4);
      display: block;
    }
    .pulse-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Grid carousel area — pinned to bottom ── */
    .grid-viewport {
      padding: 0 var(--side-margin);
      margin-bottom: 30px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .grid-track {
      display: grid;
      grid-template-columns: repeat(var(--grid-cols), 1fr);
      gap: var(--card-gap);
      transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 5px 10px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background 0.2s;
    }
    .card:hover { background: rgba(255,255,255,0.12); }

    /* Card top: photo left, leg/name right */
    .card-top {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .card-photo-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .card-photo {
      width: 77px;
      height: 77px;
      border-radius: 6px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.4);
      display: block;
    }
    /* Police badge beneath photo */
    .card-badge-row {
      margin-top: -4px;
      position: relative;
      z-index: 1;
    }
    .police-badge {
      position: relative;
      width: 22px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .police-badge .badge-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
    }
    .police-badge .badge-yrs {
      position: relative;
      z-index: 1;
      font-family: 'Gabarito', sans-serif;
      font-size: 0.55rem;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      margin-top: 10px;
      text-shadow: 0 0 4px rgba(0,0,0,1), 0 0 8px rgba(0,0,0,0.9), 0 1px 2px rgba(0,0,0,0.8);
    }
    .police-badge .badge-label {
      position: relative;
      z-index: 1;
      font-size: 0.35rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #fff;
      line-height: 1;
      text-shadow: 0 0 4px rgba(0,0,0,1), 0 0 8px rgba(0,0,0,0.9);
    }

    /* Active panel badge */
    .active-badge-row {
      margin-top: -4px;
      position: relative;
      z-index: 1;
    }
    .active-badge-row .police-badge {
      width: 28px;
      height: 40px;
    }
    .active-badge-row .badge-yrs {
      font-size: 0.65rem;
      margin-top: 14px;
    }
    .active-badge-row .badge-label {
      font-size: 0.38rem;
    }

    /* Overlay badge */
    .overlay-badge-row .police-badge {
      width: 42px;
      height: 60px;
    }
    .overlay-badge-row .badge-yrs {
      font-size: 0.95rem;
      margin-top: 20px;
    }
    .overlay-badge-row .badge-label {
      font-size: 0.5rem;
    }

    /* Identity: leg at top, name at bottom — spans photo height */
    .card-identity {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 77px; /* match photo */
    }
    .card-leg {
      font-family: 'Gabarito', sans-serif;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #fdba74;
      line-height: 1;
    }
    .card-name {
      font-family: 'Gabarito', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
    }

    /* ── Stats row ── */
    .card-stats {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-box {
      text-align: center;
      flex: 1;
    }
    .stat-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2px;
    }
    .stat-value {
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 3px 6px;
      border-radius: 4px;
    }

    /* Gauge — no label, positioned near Distance */
    .gauge-wrap {
      flex-shrink: 0;
      margin-left: -3px;
    }
    .gauge-bar {
      width: 6px;
      height: 36px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .gauge-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      border-radius: 3px;
      transition: height 0.3s;
    }

    @media (max-width: 1100px) { :root { --grid-cols: 4; } }
    @media (max-width: 860px)  {
      :root { --grid-cols: 3; }
      .bottom-cards-wrap { transform: scale(1.2); }
    }
    @media (max-width: 600px)  {
      :root { --grid-cols: 2; }
      
      /* Full page scrollable on mobile */
      html, body { overflow: auto; height: auto; }
      #app {
        height: auto;
        min-height: 100vh;
        overflow: visible;
        display: block;
      }
      
      /* Title: sticky at very top */
      .header {
        padding: 0.6rem var(--side-margin) 0.4rem;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 30;
        background: linear-gradient(135deg, #3b2416 0%, #7a3a12 50%, #2f1b13 100%);
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      .header h1 { font-size: 1.3rem; line-height: 1.2; }
      .header h1 span.pipe { display: none; }
      .header h1 .title-team { display: block; margin-top: 2px; }
      .captain { display: none; }
      
      /* Hide flex spacer */
      .flex-spacer { display: none; }
      
      /* Remove transform on wrap — breaks sticky */
      .bottom-cards-wrap {
        transform: none !important;
        margin: 0;
        padding: 0;
        width: 100%;
      }
      
      /* Stopwatch sticky below header */
      .total-time-card {
        position: sticky;
        top: 48px;
        z-index: 20;
        background: rgba(43,28,16,0.97);
        backdrop-filter: blur(10px);
        border-radius: 0;
        border: none;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        margin: 0;
        padding: 0.5rem var(--side-margin);
        width: 100%;
      }
      
      /* Active panel — compact, scrolls and collapses */
      .active-panel {
        padding: 0.7rem var(--side-margin);
        gap: 10px;
        width: 100%;
        border-radius: 0;
        border: none;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.04);
      }
      .active-panel .active-name { font-size: 1rem; }
      .active-panel .active-leg { font-size: 0.6rem; }
      .active-photo {
        width: 50px !important;
        height: 50px !important;
      }
      .active-stats .stat-value { font-size: 0.55rem; }
      .active-stats .stat-label { font-size: 0.45rem; }
      
      /* Grid — flat in page scroll, cards fill evenly */
      .grid-viewport {
        overflow: visible;
        max-height: none;
        margin: 0;
        padding: 8px 8px 60px;
      }
      .grid-track {
        transition: none !important;
        transform: none !important;
      }
      .card {
        width: 100%;
      }
    }
    /* ── Fullscreen Runner Overlay ── */
    .runner-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .runner-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .overlay-card {
      background: linear-gradient(135deg, #3b2416 0%, #7a3a12 50%, #2f1b13 100%);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 2rem;
      width: 90vw;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transform: scale(0.85);
      transition: transform 0.3s;
    }
    .runner-overlay.visible .overlay-card {
      transform: scale(1);
    }
    .overlay-photo {
      width: 160px;
      height: 160px;
      border-radius: 16px;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.3);
    }
    .overlay-name {
      font-family: 'Gabarito', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      line-height: 1.1;
    }
    .overlay-leg {
      font-family: 'Gabarito', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #fdba74;
    }
    .overlay-halfway {
      font-family: 'Gabarito', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: #f59e0b;
      letter-spacing: 0.08em;
      text-align: center;
    }
    .overlay-stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      margin-top: 4px;
    }
    .overlay-stat {
      text-align: center;
    }
    .overlay-stat .stat-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }
    .overlay-stat .stat-value {
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      padding: 6px 12px;
      border-radius: 6px;
      font-variant-numeric: tabular-nums;
    }
    .overlay-diff-label {
      font-size: 0.55rem;
      color: rgba(255,255,255,0.4);
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .overlay-diff-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 6px;
    }
    .overlay-diff-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s;
    }
    .overlay-timer {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .overlay-timer-bar {
      height: 100%;
      background: #f59e0b;
      border-radius: 2px;
      width: 100%;
      transition: width 22s linear;
    }
    .overlay-timer-bar.running { width: 0%; }
    .overlay-tap-hint {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
<div id="app"></div>
<div class="runner-overlay" id="runnerOverlay" onclick="closeOverlay()"></div>
<script>
// ═══════════════════════════════════════════════════
// CONFIG — Replace with your deployed Apps Script URL
// ═══════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycby_0jGdJiz88dRsSPG9clMu1VZ9VhhJGHmZcHwwBZnJWdeYHp4MgYK1rF49MDmSaX1r/exec';
const POLL_INTERVAL = 30000; // refresh data every 30 seconds
const FALLBACK_PHOTO = 'https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=500&q=80';
// ═══════════════════════════════════════════════════

let runners = Array.from({ length: 20 }, (_, i) => ({
  leg: i + 1, name: `Runner ${i + 1}`, years: '', time: '--:--',
  distance: '', difficulty: (i % 10) + 1, start: '--:-- PDT',
  photo: FALLBACK_PHOTO, active: i === 0
}));

function getActiveRunner() {
  return runners.find(r => r.active) || runners[0];
}

function fetchRunners() {
  // Use JSONP to bypass CORS — injects a script tag
  const cbName = '_b2v_cb_' + Date.now();
  window[cbName] = function(data) {
    delete window[cbName];
    const script = document.getElementById(cbName);
    if (script) script.remove();
    
    if (data && data.status === 'ok' && data.runners && data.runners.length) {
      runners = data.runners.map(r => ({
        ...r,
        photo: r.photo || FALLBACK_PHOTO,
        name: r.name || 'Runner ' + r.leg,
        time: r.time || '--:--',
        start: r.start || '--:-- PDT',
        difficulty: parseInt(r.difficulty) || 5
      }));
      render();
    }
  };
  
  const script = document.createElement('script');
  script.id = cbName;
  script.src = API_URL + '?callback=' + cbName + '&t=' + Date.now();
  script.onerror = function() {
    delete window[cbName];
    script.remove();
    console.log('JSONP load failed, using cached data');
  };
  document.head.appendChild(script);
}

// Initial load + polling
if (API_URL !== 'YOUR_APPS_SCRIPT_URL') {
  fetchRunners();
  setInterval(fetchRunners, POLL_INTERVAL);
}

function gaugeColor(d) {
  if (d <= 3) return '#22c55e';
  if (d <= 7) return '#facc15';
  return '#ef4444';
}

/* ── Stopwatch ── */
let stopwatchInterval = null;
let stopwatchStart = null;

function startStopwatch() {
  if (stopwatchInterval) clearInterval(stopwatchInterval);
  
  // Race start: March 22, 2026 12:00:00 PDT (UTC-7)
  stopwatchStart = new Date('2026-03-22T12:00:00-07:00').getTime();
  
  const el = document.getElementById('totalTime');
  if (!el) return;
  
  el.innerHTML = `
    <div class="total-label">Stop Watch</div>
    <div class="total-value" id="stopwatchDisplay">00:00:00.00</div>`;
  
  function updateStopwatch() {
    const now = Date.now();
    const elapsed = now - stopwatchStart;
    
    // If race hasn't started yet, show zeros
    if (elapsed <= 0) {
      const displayEl = document.getElementById('stopwatchDisplay');
      if (displayEl) displayEl.textContent = '00:00:00.00';
      return;
    }
    
    const hrs = Math.floor(elapsed / 3600000);
    const mins = Math.floor((elapsed % 3600000) / 60000);
    const secs = Math.floor((elapsed % 60000) / 1000);
    const hundredths = Math.floor((elapsed % 1000) / 10);
    
    const display = String(hrs).padStart(2, '0') + ':' +
                    String(mins).padStart(2, '0') + ':' +
                    String(secs).padStart(2, '0') + '.' +
                    String(hundredths).padStart(2, '0');
    
    const displayEl = document.getElementById('stopwatchDisplay');
    if (displayEl) displayEl.textContent = display;
  }
  
  updateStopwatch();
  stopwatchInterval = setInterval(updateStopwatch, 10);
}

function makeBadge(years) {
  const yrsText = years ? years : '—';
  return '<div class="police-badge">' +
    '<img src="' + BADGE_IMG + '" class="badge-img" />' +
    '<span class="badge-yrs">' + yrsText + '</span>' +
    '<span class="badge-label">YRS</span></div>';
}

function createCard(r) {
  const yearsDisplay = r.years || '';
  return `
  <div class="card" onclick="openRunnerOverlay(${r.leg})">
    <div class="card-top">
      <div class="card-photo-col">
        <img src="${r.photo}" alt="${r.name}" class="card-photo" />
        <div class="card-badge-row">
          ${makeBadge(yearsDisplay)}
        </div>
      </div>
      <div class="card-identity">
        <div class="card-leg">Leg ${r.leg}</div>
        <div class="card-name">${r.name}</div>
      </div>
    </div>
    <div class="card-stats">
      <div class="stat-box">
        <div class="stat-label">Distance</div>
        <div class="stat-value">${r.distance || '—'}</div>
      </div>
      <div class="gauge-wrap">
        <div class="gauge-bar">
          <div class="gauge-fill" style="height:${r.difficulty * 10}%;background:${gaugeColor(r.difficulty)}"></div>
        </div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Run Time</div>
        <div class="stat-value">${r.time}</div>
      </div>
    </div>
  </div>`;
}

/* ── Carousel state ── */
let carouselTimer = null;

function render() {
  if (carouselTimer) clearInterval(carouselTimer);

  const app = document.getElementById('app');
  const allCards = runners.map(createCard).join('');
  const ar = getActiveRunner();

  const gridContent = allCards + allCards;

  app.innerHTML = `
    <div class="header">
      <div class="header-info">
        <h1>Baker-to-Vegas<span class="pipe"> <span>|</span> </span><span class="title-team">Team LAX <span>2026</span></span></h1>
        <div class="captain">Team Captain Roxanna Carlos<br/>Airport Police, Sergeant</div>
      </div>
    </div>
    <div class="flex-spacer" style="flex:1"></div>
    <div class="bottom-cards-wrap">
      <div class="total-time-card" id="totalTime"></div>
      <div class="active-panel">
        <div class="active-info">
          <div class="label"><span class="pulse-dot"></span>Currently Running</div>
          <div class="active-name">${ar.name}</div>
          <div class="active-leg">Leg ${ar.leg}</div>
          <div class="active-stats">
            <div class="stat-box">
              <div class="stat-label">Distance</div>
              <div class="stat-value">${ar.distance || '—'}</div>
            </div>
            <div class="gauge-wrap">
              <div class="gauge-bar">
                <div class="gauge-fill" style="height:${ar.difficulty * 10}%;background:${gaugeColor(ar.difficulty)}"></div>
              </div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Running Since</div>
              <div class="stat-value ${ar.halfway ? 'halfway-split' : ''}">${ar.start}</div>
            </div>
          </div>
        </div>
        <div class="active-photo-col">
          <img src="${ar.photo}" alt="${ar.name}" class="active-photo" />
          <div class="active-badge-row">
            ${makeBadge(ar.years || '')}
          </div>
        </div>
      </div>
    </div>
    <div class="grid-viewport">
      <div class="grid-track" id="gridTrack">
        ${gridContent}
      </div>
    </div>`;

  requestAnimationFrame(() => {
    /* Start live stopwatch */
    startStopwatch();

    initCarousel();
  });
}

function initCarousel() {
  const track = document.getElementById('gridTrack');
  if (!track) return;

  /* On mobile (<=600px), enable infinite touch scroll instead of auto-scroll */
  if (window.innerWidth <= 600) {
    const viewport = track.parentElement;
    const style = getComputedStyle(document.documentElement);
    const cols = parseInt(style.getPropertyValue('--grid-cols')) || 2;
    const cards = track.querySelectorAll('.card');
    if (!cards.length) return;
    const gap = parseInt(style.getPropertyValue('--card-gap')) || 10;
    const rowOffset = cards[0].offsetHeight + gap;
    const originalRows = Math.ceil(runners.length / cols);
    const originalHeight = originalRows * rowOffset - gap;

    viewport.addEventListener('scroll', () => {
      const scrollPos = viewport.scrollTop;
      /* When scrolled past the original set, jump back seamlessly */
      if (scrollPos >= originalHeight + gap) {
        viewport.scrollTop = scrollPos - originalHeight - gap;
      }
      /* If somehow scrolled above start, jump forward */
      if (scrollPos <= 0) {
        viewport.scrollTop = scrollPos + originalHeight + gap;
      }
    });
    return;
  }

  const style = getComputedStyle(document.documentElement);
  const cols = parseInt(style.getPropertyValue('--grid-cols')) || 5;
  const totalRunners = runners.length;
  const originalRowCount = Math.ceil(totalRunners / cols);
  const VISIBLE_ROWS = 2;
  const INTERVAL_MS = 20000;

  if (originalRowCount <= VISIBLE_ROWS) return;

  const cards = track.querySelectorAll('.card');
  if (!cards.length) return;

  const gap = parseInt(style.getPropertyValue('--card-gap')) || 10;
  const rowOffset = cards[0].offsetHeight + gap;

  /* Lock viewport to exactly 2 rows */
  const viewport = track.parentElement;
  viewport.style.height = (rowOffset * VISIBLE_ROWS - gap) + 'px';

  let currentTopRow = 0;

  carouselTimer = setInterval(() => {
    currentTopRow++;

    /* When we've scrolled past all original rows, seamlessly jump back */
    if (currentTopRow >= originalRowCount) {
      track.style.transition = 'none';
      track.style.transform = 'translateY(0)';
      currentTopRow = 0;
      /* Let the jump render, then re-enable transition and advance */
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          currentTopRow = 1;
          track.style.transition = 'transform 0.9s cubic-bezier(0.4, 0, 0.2, 1)';
          track.style.transform = `translateY(-${currentTopRow * rowOffset}px)`;
        });
      });
      return;
    }

    track.style.transform = `translateY(-${currentTopRow * rowOffset}px)`;
  }, INTERVAL_MS);
}

render();

/* Recalc on resize */
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(render, 250);
});

/* ── Fullscreen Runner Overlay ── */
let overlayTimer = null;

function openRunnerOverlay(leg) {
  const r = runners.find(run => run.leg === leg);
  if (!r) return;
  
  const overlay = document.getElementById('runnerOverlay');
  const yearsDisplay = r.years || '';
  
  // Calculate pace (min/mile) from time and distance
  let paceDisplay = '—';
  if (r.time && r.time !== '--:--' && r.distance) {
    const distNum = parseFloat(r.distance);
    if (distNum > 0) {
      const timeParts = r.time.split(':');
      let totalMins = 0;
      if (timeParts.length === 2) totalMins = parseInt(timeParts[0]) + parseInt(timeParts[1]) / 60;
      if (timeParts.length === 3) totalMins = parseInt(timeParts[0]) * 60 + parseInt(timeParts[1]) + parseInt(timeParts[2]) / 60;
      const pace = totalMins / distNum;
      const paceMins = Math.floor(pace);
      const paceSecs = Math.round((pace - paceMins) * 60);
      paceDisplay = paceMins + ':' + String(paceSecs).padStart(2, '0') + '/mi';
    }
  }
  
  // Difficulty label
  const diffLabels = ['','Easy','Easy','Moderate','Moderate','Challenging','Challenging','Hard','Hard','Brutal','Brutal'];
  const diffLabel = diffLabels[r.difficulty] || '';
  
  // Halfway indicator
  const halfwayHTML = r.halfway ? '<div class="overlay-halfway">◆ HALFWAY REACHED</div>' : '';
  
  overlay.innerHTML = `
    <div class="overlay-card" onclick="event.stopPropagation()">
      <div class="overlay-leg">Leg ${r.leg}</div>
      <img src="${r.photo}" alt="${r.name}" class="overlay-photo" />
      <div class="overlay-name">${r.name}</div>
      <div class="overlay-badge-row">
        ${makeBadge(yearsDisplay)}
      </div>
      ${halfwayHTML}
      <div class="overlay-stats-grid">
        <div class="overlay-stat">
          <div class="stat-label">Distance</div>
          <div class="stat-value">${r.distance || '—'}</div>
        </div>
        <div class="overlay-stat">
          <div class="stat-label">Run Time</div>
          <div class="stat-value">${r.time || '—'}</div>
        </div>
        <div class="overlay-stat">
          <div class="stat-label">Pace</div>
          <div class="stat-value">${paceDisplay}</div>
        </div>
        <div class="overlay-stat">
          <div class="stat-label">Difficulty</div>
          <div class="stat-value">${r.difficulty}/10</div>
          <div class="overlay-diff-label">${diffLabel}</div>
        </div>
        <div class="overlay-stat">
          <div class="stat-label">Started</div>
          <div class="stat-value">${r.start || '—'}</div>
        </div>
        <div class="overlay-stat">
          <div class="stat-label">Difficulty</div>
          <div class="overlay-diff-bar">
            <div class="overlay-diff-fill" style="width:${r.difficulty * 10}%;background:${gaugeColor(r.difficulty)}"></div>
          </div>
        </div>
      </div>
      <div class="overlay-timer">
        <div class="overlay-timer-bar" id="overlayTimerBar"></div>
      </div>
      <div class="overlay-tap-hint">Tap anywhere to close</div>
    </div>`;
  
  overlay.classList.add('visible');
  
  // Start countdown bar
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const bar = document.getElementById('overlayTimerBar');
      if (bar) bar.classList.add('running');
    });
  });
  
  // Auto-close after 22 seconds
  if (overlayTimer) clearTimeout(overlayTimer);
  overlayTimer = setTimeout(closeOverlay, 22000);
}

function closeOverlay() {
  if (overlayTimer) { clearTimeout(overlayTimer); overlayTimer = null; }
  const overlay = document.getElementById('runnerOverlay');
  overlay.classList.remove('visible');
}
</script>
