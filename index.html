<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baker-to-Vegas | Team LAX 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400..900&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" async></script>
  <style>
    :root {
      --side-margin: 2.5rem;
      --grid-cols: 5;
      --card-gap: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Lexend Deca', sans-serif;
      background: linear-gradient(135deg, #3b2416 0%, #7a3a12 50%, #2f1b13 100%);
      color: #fff;
    }
    h1, .leg-label { font-family: 'Gabarito', sans-serif; }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      padding: 2rem var(--side-margin) 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .header-info { flex: 1; min-width: 260px; }
    .header h1 {
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .header h1 span { color: #f59e0b; }
    .captain {
      margin-top: 0.5rem;
      font-size: 1.1rem;
      font-weight: 300;
      color: #fbbf24;
      letter-spacing: 0.04em;
    }

    /* Bottom cards wrapper — scales both cards together */
    .bottom-cards-wrap {
      margin: 0 var(--side-margin);
      flex-shrink: 0;
      transform: scale(1.5);
      transform-origin: bottom left;
      margin-bottom: 20px;
      width: fit-content;
    }

    /* Stopwatch card — spans over active panel */
    .total-time-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 0.6rem 1.6rem;
      backdrop-filter: blur(6px);
      margin-bottom: 5px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      white-space: nowrap;
    }
    .total-time-card .total-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #fdba74;
      flex-shrink: 0;
    }
    .total-time-card .total-value {
      font-family: 'Gabarito', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    /* Halfway — flashing checkered flag pattern on left half of distance field */
    .halfway-active-distance {
      position: relative;
      overflow: visible;
      z-index: 1;
    }
    .halfway-active-distance::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 50%;
      background: 
        repeating-conic-gradient(#fff 0% 25%, transparent 0% 50%) 
        0 0 / 8px 8px;
      opacity: 0;
      border-radius: 3px;
      z-index: -1;
      animation: halfwayFlash 2.25s infinite;
      clip-path: inset(0 0 0 0 round 3px);
    }
    @keyframes halfwayFlash {
      0%, 66.7% { opacity: 0.35; }
      66.7%, 100% { opacity: 0; }
    }

    /* Active runner panel — left-aligned above cards */
    .active-panel {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 1.2rem 1.6rem;
      width: fit-content;
      backdrop-filter: blur(6px);
      display: flex;
      gap: 14px;
      align-items: stretch;
    }
    .active-info {
      display: flex;
      flex-direction: column;
    }
    .active-panel .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #fdba74;
      margin-bottom: 0.25rem;
    }
    .active-panel .active-name {
      font-family: 'Gabarito', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.1;
    }
    .active-panel .active-leg {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #fdba74;
      margin-top: 2px;
    }
    .active-panel .start-time { font-size: 0.7rem; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .active-stats {
      display: flex;
      gap: 6px;
      align-items: flex-end;
      margin-top: auto;
    }
    .active-stats .stat-box { text-align: center; }
    .active-stats .stat-label {
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2px;
    }
    .active-stats .stat-value {
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 600;
      font-size: 0.65rem;
      padding: 2px 5px;
      border-radius: 3px;
    }
    .active-stats .gauge-wrap {
      flex-shrink: 0;
      margin-left: -3px;
    }
    .active-stats .gauge-bar {
      width: 5px;
      height: 28px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .active-stats .gauge-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      border-radius: 3px;
    }
    .active-photo-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .active-photo {
      width: 89px;
      height: 89px;
      border-radius: 6px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.4);
      display: block;
    }
    .pulse-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
    @keyframes mapMarkerPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.6), 0 2px 6px rgba(0,0,0,0.5); transform: scale(1); }
      50% { box-shadow: 0 0 0 12px rgba(245, 158, 11, 0), 0 2px 6px rgba(0,0,0,0.5); transform: scale(1.1); }
    }

    /* ── Grid carousel area — pinned to bottom ── */
    .grid-viewport {
      padding: 0 var(--side-margin);
      margin-bottom: 30px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .grid-track {
      display: grid;
      grid-template-columns: repeat(var(--grid-cols), 1fr);
      gap: var(--card-gap);
      transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 5px 10px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background 0.2s;
    }
    .card:hover { background: rgba(255,255,255,0.12); }

    /* Card top: photo left, leg/name right */
    .card-top {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .card-photo-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .card-photo {
      width: 77px;
      height: 77px;
      border-radius: 6px;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.4);
      display: block;
    }
    /* Police badge beneath photo */
    .card-badge-row {
      margin-top: -4px;
      position: relative;
      z-index: 1;
    }
    .police-badge {
      position: relative;
      width: 22px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .police-badge .badge-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
    }
    .police-badge .badge-yrs {
      position: relative;
      z-index: 1;
      font-family: 'Gabarito', sans-serif;
      font-size: 0.6rem;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      margin-top: 10px;
      text-shadow: 0 0 4px rgba(0,0,0,1), 0 0 8px rgba(0,0,0,0.9), 0 1px 2px rgba(0,0,0,0.8);
    }
    .police-badge .badge-label {
      position: relative;
      z-index: 1;
      font-size: 0.35rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #fff;
      line-height: 1;
      text-shadow: 0 0 4px rgba(0,0,0,1), 0 0 8px rgba(0,0,0,0.9);
    }

    /* Active panel badge */
    .active-badge-row {
      margin-top: -4px;
      position: relative;
      z-index: 1;
    }
    .active-badge-row .police-badge {
      width: 28px;
      height: 40px;
    }
    .active-badge-row .badge-yrs {
      font-size: 0.72rem;
      margin-top: 14px;
    }
    .active-badge-row .badge-label {
      font-size: 0.38rem;
    }

    /* Overlay badge */
    .overlay-badge-row .police-badge {
      width: 42px;
      height: 60px;
    }
    .overlay-badge-row .badge-yrs {
      font-size: 1.05rem;
      margin-top: 20px;
    }
    .overlay-badge-row .badge-label {
      font-size: 0.5rem;
    }

    /* Identity: leg at top, name at bottom — spans photo height */
    .card-identity {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 77px; /* match photo */
    }
    .card-leg {
      font-family: 'Gabarito', sans-serif;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #fdba74;
      line-height: 1;
    }
    .card-name {
      font-family: 'Gabarito', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      white-space: normal;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.15;
      text-align: left;
    }

    /* ── Stats row ── */
    .card-stats {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-box {
      text-align: center;
      flex: 1;
    }
    .stat-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2px;
    }
    .stat-value {
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 3px 6px;
      border-radius: 4px;
    }

    /* Gauge — no label, positioned near Distance */
    .gauge-wrap {
      flex-shrink: 0;
      margin-left: -3px;
    }
    .gauge-bar {
      width: 6px;
      height: 36px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .gauge-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      border-radius: 3px;
      transition: height 0.3s;
    }

    @media (max-width: 1100px) { :root { --grid-cols: 4; } }
    @media (max-width: 860px)  {
      :root { --grid-cols: 3; }
      .bottom-cards-wrap { transform: scale(1.2); }
    }
    @media (max-width: 600px)  {
      :root { --grid-cols: 2; }
      
      /* Full page scrollable on mobile */
      html, body { overflow: auto; height: auto; }
      #app {
        height: auto;
        flex-direction: column;
        min-height: 100vh;
        overflow: visible;
        display: block;
      }
      
      /* Title: sticky at very top */
      .header {
        padding: 0.6rem var(--side-margin) 0.4rem;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 30;
        background: linear-gradient(135deg, #3b2416 0%, #7a3a12 50%, #2f1b13 100%);
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      .header h1 { font-size: 1.3rem; line-height: 1.2; }
      .header h1 span.pipe { display: none; }
      .header h1 .title-team { display: block; margin-top: 2px; }
      .captain { display: none; }
      
      /* Hide flex spacer */
      .flex-spacer { display: none; }
      
      /* Remove transform on wrap — breaks sticky */
      .bottom-cards-wrap {
        transform: none !important;
        margin: 0;
        padding: 0;
        width: 100%;
      }
      
      /* Stopwatch sticky below header */
      .total-time-card {
        position: sticky;
        top: 48px;
        z-index: 20;
        background: rgba(43,28,16,0.97);
        backdrop-filter: blur(10px);
        border-radius: 0;
        border: none;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        margin: 0;
        padding: 0.5rem var(--side-margin);
        width: 100%;
      }
      
      /* Active panel — prominent full-width card on mobile */
      .active-panel {
        display: flex;
        padding: 14px 16px;
        gap: 12px;
        width: 100%;
        border-radius: 0;
        border: none;
        background: linear-gradient(135deg, rgba(245,158,11,0.08) 0%, rgba(255,255,255,0.06) 100%);
        border-top: 2px solid rgba(245,158,11,0.3);
        border-bottom: 2px solid rgba(245,158,11,0.3);
        margin: 0;
        align-items: stretch;
      }
      .active-panel .active-info {
        flex: 1;
        min-width: 0;
      }
      .active-panel .label { font-size: 0.65rem; }
      .active-panel .active-name { font-size: 1.15rem; }
      .active-panel .active-leg { font-size: 0.65rem; }
      .active-photo-col {
        flex-shrink: 0;
      }
      .active-photo {
        width: 65px !important;
        height: 65px !important;
      }
      .active-stats {
        margin-top: 6px;
      }
      .active-stats .stat-value { font-size: 0.65rem; padding: 3px 6px; }
      .active-stats .stat-label { font-size: 0.45rem; }
      
      /* Grid — natural scroll on mobile */
      .grid-viewport {
        overflow: visible;
        max-height: none;
        margin: 0;
        padding: 8px 8px 30px;
      }
      .grid-track {
        transition: none !important;
        transform: none !important;
      }
      .card {
        width: 100%;
      }
      
    }
    /* ── Sponsor Cards ── */
    .card.sponsor-card {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 5px 10px 20px;
      align-items: center;
    }
    .sponsor-card .sponsor-tag {
      font-family: 'Gabarito', sans-serif;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #fdba74;
      line-height: 1;
      align-self: center;
    }
    .sponsor-card .sponsor-logo {
      width: 77px;
      height: 77px;
      object-fit: contain;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      padding: 4px;
      margin-top: 3px;
    }
    .sponsor-card .sponsor-name {
      font-family: 'Gabarito', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      color: #fff;
      text-align: center;
      line-height: 1.15;
      white-space: normal;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* ── Sponsor Overlay ── */
    .sponsor-overlay-card {
      position: relative;
      background: linear-gradient(135deg, #3b2416 0%, #7a3a12 50%, #2f1b13 100%);
      border: 2px solid rgba(245,158,11,0.2);
      border-radius: 20px;
      padding: 2rem;
      width: 90vw;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transform: scale(0.85) rotateY(180deg);
      transition: transform 0.6s ease;
    }
    .runner-overlay.visible .sponsor-overlay-card {
      transform: scale(1) rotateY(0deg);
    }
    .sponsor-overlay-logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px;
    }
    .sponsor-overlay-name {
      font-family: 'Gabarito', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      text-align: center;
    }
    .sponsor-overlay-desc {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      text-align: center;
      line-height: 1.5;
      max-width: 320px;
    }
    .sponsor-overlay-link {
      display: inline-block;
      padding: 8px 20px;
      background: var(--accent, #f59e0b);
      color: #1a0f05;
      border-radius: 6px;
      text-decoration: none;
      font-family: 'Gabarito', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
    }

    /* ── Distance link styling ── */
    /* ── Stage Detail Overlay ── */
    .stage-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(12px);
      z-index: 600;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s, transform 0.6s ease;
      transform: rotateY(180deg);
    }
    .stage-overlay.visible {
      opacity: 1;
      pointer-events: auto;
      transform: rotateY(0deg);
    }
    .stage-overlay-header {
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(245,158,11,0.2);
    }
    .stage-overlay-header h2 {
      font-family: 'Gabarito', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: #f59e0b;
    }
    .stage-overlay-close {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      position: relative;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stage-overlay-close .close-x {
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
      position: relative;
      z-index: 1;
    }
    .stage-overlay-close svg {
      position: absolute;
      top: 0; left: 0;
      width: 40px;
      height: 40px;
      transform: rotate(-90deg);
    }
    .stage-overlay-close .ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.1);
      stroke-width: 3;
    }
    .stage-overlay-close .ring-countdown {
      fill: none;
      stroke: #f59e0b;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 113;
      stroke-dashoffset: 0;
    }
    .stage-overlay-close .ring-countdown.running {
      animation: ringDrain90 90s linear forwards;
    }
    @keyframes ringDrain90 {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: 113; }
    }
    .stage-map-container {
      flex: 1;
      position: relative;
    }
    .stage-map-container #stageMap {
      width: 100%;
      height: 100%;
    }
    .stage-info-bar {
      padding: 12px 20px;
      background: rgba(26,17,8,0.95);
      border-top: 1px solid rgba(245,158,11,0.2);
      flex-shrink: 0;
    }
    .stage-info-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .stage-info-item {
      text-align: center;
    }
    .stage-info-item .si-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 2px;
    }
    .stage-info-item .si-value {
      font-family: 'Gabarito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
    }
    .stage-desc-text {
      margin-top: 10px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.4;
    }
    .stage-gps-text {
      margin-top: 6px;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.35);
      font-variant-numeric: tabular-nums;
    }

    /* ── Fullscreen Runner Overlay ── */
    .runner-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.6s;
      pointer-events: none;
    }
    .runner-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .overlay-card {
      position: relative;
      background: linear-gradient(135deg, #3b2416 0%, #7a3a12 50%, #2f1b13 100%);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 2rem;
      width: 90vw;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transform: scale(0.85) rotateY(180deg);
      transition: transform 0.6s ease;
    }
    .runner-overlay.visible .overlay-card {
      transform: scale(1) rotateY(0deg);

let runners = Array.from({ length: 20 }, (_, i) => ({
  leg: i + 1, name: `Runner ${i + 1}`, years: '', time: '--:--',
  distance: STAGE_DISTANCES[i + 1] || '', difficulty: STAGE_DIFFICULTY[i + 1] || 10,
  start: '--:-- PDT',
  photo: FALLBACK_PHOTO, active: i === 0
}));

function getActiveRunner() {
  return runners.find(r => r.active) || runners[0];
}

function fetchRunners() {
  // Use JSONP to bypass CORS — injects a script tag
  const cbName = '_b2v_cb_' + Date.now();
  let handled = false;
  
  window[cbName] = function(data) {
    handled = true;
    delete window[cbName];
    const script = document.getElementById(cbName);
    if (script) script.remove();
    
    // DEBUG: show what clock data we received
    if (data && data.clock) {
      console.log('B2V Clock data:', JSON.stringify(data.clock));
      var dbg = document.getElementById('clockDebug');
      if (dbg) dbg.textContent = 'API: status=' + (data.clock.status||'?') + ' start=' + (data.clock.autoStartTime||'none');
    }
    
    if (data && data.status === 'ok' && data.runners && data.runners.length) {
      var newRunners = data.runners.map(r => ({
        ...r,
        photo: r.photo || FALLBACK_PHOTO,
        name: r.name || 'Runner ' + r.leg,
        time: r.time || '--:--',
        start: r.start || '--:-- PDT',
        distance: r.distance || STAGE_DISTANCES[r.leg] || '',
        difficulty: parseInt(r.difficulty) || STAGE_DIFFICULTY[r.leg] || 10
      }));
      
      // Read clock state from API
      if (data.clock) {
        const c = data.clock;
        clockStatus = c.status || 'running';
        clockAdvisory = c.advisory || '';
        clockStoppedAt = c.stoppedAt || '';
        clockConfirmedTime = c.confirmedTime || '';
        if (c.autoStartTime) {
          stopwatchStart = new Date(c.autoStartTime).getTime();
        }
      }
      // If status is stopped but has no stoppedAt, treat as running
      if (clockStatus === 'stopped' && !clockStoppedAt) {
        clockStatus = 'running';
      }
      
      // Only do full render if data actually changed (avoid destroying carousel)
      var runnersChanged = JSON.stringify(newRunners) !== JSON.stringify(runners);
      runners = newRunners;
      
      // Update active ads from API
      var newAds = [];
      if (data.ads && data.ads.length) {
        data.ads.forEach(function(ad) {
          if (ad.active && (ad.name || ad.logoUrl)) {
            newAds.push(ad);
          }
        });
      }
      var adsChanged = JSON.stringify(newAds) !== JSON.stringify(activeAds);
      activeAds = newAds;
      
      var newAlts = data.alternates || [];
      var altsChanged = JSON.stringify(newAlts) !== JSON.stringify(alternates);
      alternates = newAlts;
      
      if (runnersChanged || adsChanged || altsChanged || !document.getElementById('gridTrack')) {
        render();
      }
    }
  };
  
  const script = document.createElement('script');
  script.id = cbName;
  script.src = API_URL + '?callback=' + cbName + '&t=' + Date.now();
  script.onerror = function() {
    if (handled) return;
    handled = true;
    delete window[cbName];
    script.remove();
    console.log('JSONP load failed');
    var dbg = document.getElementById('clockDebug');

}

function gaugeColor(d) {
  // B2V scale: 1=most difficult → 20=least difficult
  // 4 solid colors only
  d = Math.max(1, Math.min(20, d));
  if (d <= 2)  return '#D10000';  // Dark red
  if (d <= 9)  return '#FF0000';  // Red
  if (d <= 16) return '#FACC15';  // Yellow
  return '#22c55e';               // Green (17-20)
}

/* ── Stopwatch ── */
let stopwatchInterval = null;

// Check URL parameter first: ?start=2026-03-28T08:00:00-07:00
const urlParams = new URLSearchParams(window.location.search);
const urlStart = urlParams.get('start');
let stopwatchStart = urlStart ? new Date(urlStart).getTime() : new Date('2026-03-28T08:00:00-07:00').getTime();
let clockStatus = urlStart ? 'running' : 'running';
let clockConfirmedTime = '';
let clockStoppedAt = '';
let clockAdvisory = '';

function startStopwatch() {
  if (stopwatchInterval) clearInterval(stopwatchInterval);
  
  const el = document.getElementById('totalTime');
  if (!el) return;
  
  el.innerHTML = `
    <div class="total-label">Stop Watch</div>
    <div class="total-value" id="stopwatchDisplay">00:00:00.00</div>
    <div id="clockUnofficialBanner" style="display:none;font-family:Gabarito,sans-serif;font-size:1rem;font-weight:900;color:#ef4444;text-align:center;letter-spacing:0.15em;text-transform:uppercase;display:none"></div>`;
  
  var flashToggle = true;
  
  stopwatchInterval = setInterval(function() {
    var displayEl = document.getElementById('stopwatchDisplay');
    var bannerEl = document.getElementById('clockUnofficialBanner');
    if (!displayEl) return;
    
    // Confirmed — show final time in gold, hide banner
    if (clockStatus === 'confirmed' && clockConfirmedTime) {
      displayEl.textContent = clockConfirmedTime;
      displayEl.style.color = '#f59e0b';
      if (bannerEl) bannerEl.style.display = 'none';
      return;
    }
    
    // Stopped — freeze the time, flash UNOFFICIAL
    if (clockStatus === 'stopped') {
      // Calculate frozen time
      var frozenTime = clockStoppedAt;
      if (!frozenTime) {
        var frozenElapsed = Date.now() - stopwatchStart;
        if (frozenElapsed > 0) {
          var fh = Math.floor(frozenElapsed / 3600000);
          var fm = Math.floor((frozenElapsed % 3600000) / 60000);
          var fs = Math.floor((frozenElapsed % 60000) / 1000);
          frozenTime = String(fh).padStart(2,'0') + ':' + String(fm).padStart(2,'0') + ':' + String(fs).padStart(2,'0');
        } else {
          frozenTime = '00:00:00';
        }
      }
      displayEl.textContent = frozenTime;
      displayEl.style.color = '';
      
      // Flash only UNOFFICIAL — 2 sec on, 300ms off
      if (bannerEl) {
        bannerEl.style.display = 'inline';
        bannerEl.textContent = '  UNOFFICIAL';
        var cycle = Date.now() % 2300;
        bannerEl.style.opacity = cycle < 2000 ? '1' : '0';
      }
      return;
    }
    
    // Running — count up, hide banner
    displayEl.style.color = '';
    if (bannerEl) bannerEl.style.display = 'none';
    var elapsed = Date.now() - stopwatchStart;
    if (elapsed <= 0) {
      displayEl.textContent = '00:00:00.00';
      return;
    }
    var h = Math.floor(elapsed / 3600000);
    var m = Math.floor((elapsed % 3600000) / 60000);
    var s = Math.floor((elapsed % 60000) / 1000);
    var cs = Math.floor((elapsed % 1000) / 10);
    displayEl.textContent = 
      String(h).padStart(2,'0') + ':' + 
      String(m).padStart(2,'0') + ':' + 
      String(s).padStart(2,'0') + '.' + 
      String(cs).padStart(2,'0');
  }, 50);
}

function isRaceStarted() {
  // Race panel switches on 90 seconds before gun time, or if active runner has a real start time
  var ar = getActiveRunner();
  if (ar && ar.start && ar.start !== '--:-- PDT' && ar.start !== '--:--') return true;

    '</div>';
  }).join('');
}

// Pre-race countdown updater
let preRaceInterval = null;
function startPreRaceCountdown() {
  if (preRaceInterval) clearInterval(preRaceInterval);
  preRaceInterval = setInterval(function() {
    var el = document.getElementById('preRaceCountdown');
    if (!el) return;
    var now = Date.now();
    var diff = RACE_GUN_TIME - now;
    if (diff <= 0) {
      el.innerHTML = '<span class="pulse-dot"></span> RACE IS LIVE';
      clearInterval(preRaceInterval);
      // Auto-switch to running view after a short delay
      setTimeout(function() { render(); }, 3000);
      return;
    }
    var hrs = Math.floor(diff / 3600000);
    var mins = Math.floor((diff % 3600000) / 60000);
    var secs = Math.floor((diff % 60000) / 1000);
    var parts = [];
    if (hrs > 0) parts.push(hrs + 'h');
    parts.push(mins + 'm');
    parts.push(secs + 's');
    el.textContent = '⏱ Gun time in ' + parts.join(' ');
  }, 1000);
}

function initCarousel() {
  const track = document.getElementById('gridTrack');
  if (!track) return;

  /* On mobile (<=600px), just let users scroll naturally — no carousel */
  if (window.innerWidth <= 600) {
    return;
  }

  const style = getComputedStyle(document.documentElement);
  const cols = parseInt(style.getPropertyValue('--grid-cols')) || 5;
  const totalCards = track.querySelectorAll('.card').length / 2; // divided by 2 because cards are doubled
  const originalRowCount = Math.ceil(totalCards / cols);
  const VISIBLE_ROWS = 2;
  const INTERVAL_MS = 20000;
  const PAUSE_AFTER_INTERACTION = 20000;

  if (originalRowCount <= VISIBLE_ROWS) return;

  const cards = track.querySelectorAll('.card');
  if (!cards.length) return;

  const gap = parseInt(style.getPropertyValue('--card-gap')) || 10;
  const rowOffset = cards[0].offsetHeight + gap;

  /* Lock viewport to exactly 2 rows */
  const viewport = track.parentElement;
  viewport.style.height = (rowOffset * VISIBLE_ROWS - gap) + 'px';
  viewport.style.overflow = 'hidden';

  let currentTopRow = 0;
  let userInteracted = false;
  let interactionTimer = null;
  const maxRow = originalRowCount * 2 - VISIBLE_ROWS; // max scroll position in the doubled set

  function onUserInteraction() {
    userInteracted = true;
    if (interactionTimer) clearTimeout(interactionTimer);
    interactionTimer = setTimeout(function() {
      userInteracted = false;
      // Reset position to first set for seamless auto-scroll resume
      if (currentTopRow >= originalRowCount) {
        track.style.transition = 'none';
        currentTopRow = currentTopRow - originalRowCount;
        track.style.transform = 'translateY(-' + (currentTopRow * rowOffset) + 'px)';
      }
    }, PAUSE_AFTER_INTERACTION);
  }

  // Manual scroll via mouse wheel — smooth, no snap
  viewport.addEventListener('wheel', function(e) {
    e.preventDefault();
    onUserInteraction();
    if (e.deltaY > 0) {
      currentTopRow++;
    } else {
      currentTopRow--;
    }
    // Clamp within the doubled range
    if (currentTopRow < 0) currentTopRow = 0;
    if (currentTopRow > maxRow) currentTopRow = maxRow;
    track.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
    track.style.transform = 'translateY(-' + (currentTopRow * rowOffset) + 'px)';
  }, { passive: false });

  // Manual scroll via touch swipe
  let touchStartY = 0;
  let touchMoved = false;
  viewport.addEventListener('touchstart', function(e) {
    touchStartY = e.touches[0].clientY;
    touchMoved = false;
    onUserInteraction();
  }, { passive: true });
  viewport.addEventListener('touchmove', function(e) {
    touchMoved = true;
  }, { passive: true });
  viewport.addEventListener('touchend', function(e) {
    if (!touchMoved) return;
    var diff = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(diff) > 30) {
      if (diff > 0) {
        currentTopRow++;
      } else {
        currentTopRow--;
      }
      if (currentTopRow < 0) currentTopRow = 0;
      if (currentTopRow > maxRow) currentTopRow = maxRow;
      track.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
      track.style.transform = 'translateY(-' + (currentTopRow * rowOffset) + 'px)';
    }
  }, { passive: true });

  carouselTimer = setInterval(() => {
    // Skip auto-scroll if user recently interacted
    if (userInteracted) return;

    currentTopRow++;

    /* When we've scrolled past all original rows, seamlessly jump back */
    if (currentTopRow >= originalRowCount) {
      track.style.transition = 'none';
      track.style.transform = 'translateY(0)';
      currentTopRow = 0;
      /* Let the jump render, then re-enable transition and advance */
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          currentTopRow = 1;
          track.style.transition = 'transform 0.9s cubic-bezier(0.4, 0, 0.2, 1)';
          track.style.transform = `translateY(-${currentTopRow * rowOffset}px)`;
        });
      });
      return;
    }

    track.style.transition = 'transform 0.9s cubic-bezier(0.4, 0, 0.2, 1)';
    track.style.transform = `translateY(-${currentTopRow * rowOffset}px)`;
  }, INTERVAL_MS);
}

      const timeParts = r.time.split(':');
      let totalMins = 0;

        // Active segment — flashing red
        const activeLine = L.polyline(precodedSegments[i], {
          color: '#ff3333', weight: 5, opacity: 0.9
        }).addTo(stageMap);
        let flashVisible = true;
        stageFlashInterval = setInterval(() => {
          flashVisible = !flashVisible;
          activeLine.setStyle({ opacity: flashVisible ? 0.9 : 0 });
        }, 1500);
      } else {
        // Non-active — solid gold route line
        L.polyline(precodedSegments[i], {
          color: '#f59e0b', weight: 3, opacity: 0.5
        }).addTo(stageMap);
      }
    }

      const isCurrentStage = (i === leg);
      const isFinish = (i === 21);
      const mColor = i === 1 ? '#22c55e' : isFinish ? '#ef4444' : (isCurrentStage ? '#f59e0b' : 'rgba(60,40,20,0.85)');
      const mSize = isFinish ? 28 : (isCurrentStage ? 34 : 22);
      const mFont = isFinish ? '11px' : (isCurrentStage ? '14px' : '9px');
      const mBorder = isCurrentStage ? '3px solid #fff' : '2px solid rgba(255,255,255,0.5)';
      const mColor2 = isCurrentStage ? '#1a0f05' : '#fff';
      const pulseAnim = isCurrentStage ? 'animation:mapMarkerPulse 1.4s infinite;' : '';
      const mShadow = 'box-shadow:0 2px 6px rgba(0,0,0,0.5);';
      const label = isFinish ? '🏁' : String(i);
      
      L.marker([s.lat, s.lng], {

          className: '',

          iconAnchor: [mSize/2, mSize/2]
        })
      }).addTo(stageMap);
    }

    if (stageData[leg + 1]) {
      const nextStage = stageData[leg + 1];
      stageMap.fitBounds([
        [stage.lat, stage.lng],
        [nextStage.lat, nextStage.lng]
      ], { padding: [60, 60] });
    } else {
      stageMap.setView([stage.lat, stage.lng], 13);
    }
    
    stageMap.invalidateSize();

  stageDetailTimer = setTimeout(closeStageDetail, 90000);
}

function closeStageDetail() {
  if (stageDetailTimer) { clearTimeout(stageDetailTimer); stageDetailTimer = null; }
  document.getElementById('stageOverlay').classList.remove('visible');
  const ring = document.getElementById('countdownRing');
  if (ring) ring.classList.remove('running');
  if (stageFlashInterval) { clearInterval(stageFlashInterval); stageFlashInterval = null; }
  if (stageMap) {
    stageMap.remove();
    stageMap = null;
  }
}

// ── Initialize ──
try {
  render();
  if (API_URL !== 'YOUR_APPS_SCRIPT_URL') {
    fetchRunners();
    setInterval(fetchRunners, POLL_INTERVAL);
  }
  // Live viewer heartbeat — pings every 30s, server counts active IPs within last 60s
  (function initLiveViewers() {
    var viewerIp = null;
    var page = 'viewer';
    
    // Get IP once
    fetch('https://api.ipify.org?format=json')
      .then(function(r) { return r.json(); })
      .then(function(d) { viewerIp = d.ip || 'unknown'; sendHeartbeat(); })
      .catch(function() { viewerIp = 'unknown'; sendHeartbeat(); });
    
    function sendHeartbeat() {
      var cb = '_hb_' + Date.now();
      window[cb] = function(data) {
        delete window[cb];
        var sc = document.getElementById(cb); if (sc) sc.remove();
        var el = document.getElementById('liveViewers');
        if (el && data) {
          var live = data.live || 0;
          var total = data.unique || 0;
          if (live > 0 || total > 0) {
            el.textContent = 'VIEWS: ' + live + ' active | ' + total + ' total';
            el.style.color = 'rgba(255,255,255,0.2)';
          }
        }
      };
      var sc = document.createElement('script');
      sc.id = cb;
      sc.src = API_URL + '?action=heartbeat&ip=' + (viewerIp||'') + '&page=' + page + '&ua=' + encodeURIComponent(navigator.userAgent.substring(0, 200)) + '&callback=' + cb + '&t=' + Date.now();
      sc.onerror = function() { delete window[cb]; sc.remove(); };
      document.head.appendChild(sc);
    }
    
    // Heartbeat every 30 seconds
    setInterval(sendHeartbeat, 30000);
  })();
} catch(e) {
  console.error('B2V Init Error:', e);
  document.body.innerHTML = '<div style="color:red;padding:20px;font-family:monospace">Init Error: ' + e.message + '</div>';
}
