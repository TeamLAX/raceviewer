<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>B2V Admin | Team LAX 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1a1108;
      --surface: #2a1c0e;
      --surface2: #3a2816;
      --border: #4a3520;
      --accent: #f59e0b;
      --accent-dim: #b87308;
      --text: #f5f0e8;
      --text-dim: #a89880;
      --green: #22c55e;
      --red: #ef4444;
      --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Barlow Condensed', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── PIN Gate ── */
    .pin-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .pin-gate h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .pin-gate .subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .pin-input {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      text-align: center;
      letter-spacing: 0.5em;
      padding: 0.8rem 1.5rem;
      width: 200px;
      outline: none;
      transition: border-color 0.2s;
    }
    .pin-input:focus { border-color: var(--accent); }
    .pin-input.error { border-color: var(--red); animation: shake 0.4s; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    .pin-btn {
      margin-top: 1.5rem;
      background: var(--accent);
      color: var(--bg);
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border: none;
      border-radius: var(--radius);
      padding: 0.8rem 2.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .pin-btn:active { background: var(--accent-dim); }

    /* ── Admin Shell ── */
    .admin-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.3rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .admin-header .sync-status {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .admin-header .sync-status.syncing { color: var(--accent); }
    .admin-header .sync-status.error { color: var(--red); }

    /* ── Runner List ── */
    .runner-list {
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 100px;
    }

    /* ── Runner Card (collapsed) ── */
    .runner-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .runner-card.active-runner { border-color: var(--green); }
    .runner-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .runner-card-header .leg-badge {
      font-family: 'Oswald', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--bg);
      background: var(--accent);
      border-radius: 4px;
      padding: 2px 8px;
      flex-shrink: 0;
    }
    .runner-card.active-runner .leg-badge { background: var(--green); }
    .runner-card-header .runner-summary {
      flex: 1;
      overflow: hidden;
    }
    .runner-card-header .runner-summary .name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .runner-card-header .runner-summary .name.empty { color: var(--text-dim); font-style: italic; }
    .runner-card-header .runner-summary .meta {
      font-size: 0.7rem;
      color: var(--text-dim);
    }
    .runner-card-header .chevron {
      color: var(--text-dim);
      font-size: 1.2rem;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .runner-card.open .chevron { transform: rotate(180deg); }
    .runner-card-header .active-dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse-dot 1.4s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Runner Card (expanded) ── */
    .runner-card-body {
      display: none;
      padding: 0 12px 14px;
    }
    .runner-card.open .runner-card-body { display: block; }

    .field-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .field {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .field label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 3px;
    }
    .field input, .field select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      padding: 8px 10px;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--text-dim); opacity: 0.5; }

    .actions-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .btn-save {
      flex: 1;
      background: var(--accent);
      color: var(--bg);
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 6px;
      padding: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:active { background: var(--accent-dim); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-save.saved { background: var(--green); }

    .btn-set-active {
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-radius: 6px;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-set-active:active { background: var(--green); color: var(--bg); }
    .btn-set-active.is-active {
      background: var(--green);
      color: var(--bg);
      pointer-events: none;
    }

    /* ── Halfway Checkbox ── */
    .halfway-check {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .halfway-check input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .halfway-check span {
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    /* ── Photo Upload ── */
    .photo-upload-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .photo-preview {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      border: 2px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .no-photo {
      font-size: 0.55rem;
      color: var(--text-dim);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .photo-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .btn-photo {
      display: block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      padding: 8px 12px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s;
    }
    .btn-photo:active { border-color: var(--accent); }
    .photo-status {
      font-size: 0.65rem;
      color: var(--accent);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 20px;
      font-size: 0.8rem;
      z-index: 200;
      max-width: 90vw;
      text-align: center;
      word-break: break-word;
      transition: transform 0.3s;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }
  </style>
</head>
<body>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG — Replace with your deployed Apps Script URL
// ═══════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycby_0jGdJiz88dRsSPG9clMu1VZ9VhhJGHmZcHwwBZnJWdeYHp4MgYK1rF49MDmSaX1r/exec';
// ═══════════════════════════════════════════════════

let PIN = '';
let runners = [];
let openCard = null;

function showToast(msg, type = 'success', duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.className = 'toast', duration);
}

// ── PIN Gate ──
function renderPinGate(error = false) {
  document.getElementById('app').innerHTML = `
    <div class="pin-gate">
      <h1>B2V Admin</h1>
      <div class="subtitle">Team LAX 2026</div>
      <input type="password" inputmode="numeric" class="pin-input ${error ? 'error' : ''}" 
             id="pinInput" maxlength="10" placeholder="• • • •" autofocus />
      <button class="pin-btn" onclick="submitPin()">Enter</button>
    </div>`;
  
  document.getElementById('pinInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitPin();
  });
}

async function submitPin() {
  PIN = document.getElementById('pinInput').value.trim();
  if (!PIN) { renderPinGate(true); return; }

  const btn = document.querySelector('.pin-btn');
  btn.disabled = true;
  btn.textContent = 'Loading...';

  // Load runner data via JSONP (bypasses CORS)
  try {
    const data = await fetchData();

    if (data && data.status === 'ok' && data.runners) {
      // Validate PIN with a POST
      try {
        const result = await postJSON({ pin: PIN, leg: 1 });
        if (result && result.status === 'error' && result.message === 'Invalid PIN') {
          btn.disabled = false;
          btn.textContent = 'Enter';
          showToast('Invalid PIN', 'error');
          renderPinGate(true);
          return;
        }
      } catch (e) { /* proceed, validate on save */ }

      runners = data.runners;
      renderAdmin();
      return;
    } else {
      btn.disabled = false;
      btn.textContent = 'Enter';
      showToast('API error: ' + (data && data.message ? data.message : 'Unknown'), 'error', 8000);
      renderPinGate(false);
      return;
    }
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Enter';
    showToast('Load failed: ' + err.message, 'error', 8000);
    renderPinGate(false);
    return;
  }
}

// ── Fetch helpers ──
function fetchData() {
  return new Promise((resolve, reject) => {
    const cbName = '_b2v_admin_' + Date.now();
    const timeout = setTimeout(() => {
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      reject(new Error('Timeout loading data'));
    }, 15000);

    window[cbName] = function(data) {
      clearTimeout(timeout);
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      resolve(data);
    };

    const script = document.createElement('script');
    script.id = cbName;
    script.src = API_URL + '?callback=' + cbName + '&t=' + Date.now();
    script.onerror = function() {
      clearTimeout(timeout);
      delete window[cbName];
      script.remove();
      reject(new Error('Script load failed'));
    };
    document.head.appendChild(script);
  });
}

function postJSON(payload) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', API_URL, true);
    xhr.setRequestHeader('Content-Type', 'text/plain');
    xhr.timeout = 15000;
    xhr.onload = function() {
      try { resolve(JSON.parse(xhr.responseText)); }
      catch (e) { resolve({ status: 'ok' }); }
    };
    xhr.onerror = function() { reject(new Error('Network error')); };
    xhr.ontimeout = function() { reject(new Error('Timeout')); };
    xhr.send(JSON.stringify(payload));
  });
}

// ── Admin Panel ──
function renderAdmin() {
  const activeLeg = runners.find(r => r.active);
  
  document.getElementById('app').innerHTML = `
    <div class="admin-header">
      <h1>B2V Admin — Team LAX 2026</h1>
      <div class="sync-status" id="syncStatus">
        ${activeLeg ? '● Leg ' + activeLeg.leg + ' running' : 'No active runner'}
      </div>
    </div>
    <div class="runner-list" id="runnerList">
      ${runners.map(r => renderRunnerCard(r)).join('')}
    </div>`;
}

function renderRunnerCard(r) {
  const isOpen = openCard === r.leg;
  const isActive = r.active;
  const nameDisplay = r.name || 'Unassigned';
  const metaParts = [];
  if (r.distance) metaParts.push(r.distance);
  if (r.time) metaParts.push(r.time);
  if (r.years) metaParts.push(r.years + ' yrs');
  const metaStr = metaParts.length ? metaParts.join(' · ') : 'No data';

  return `
  <div class="runner-card ${isOpen ? 'open' : ''} ${isActive ? 'active-runner' : ''}" id="card-${r.leg}">
    <div class="runner-card-header" onclick="toggleCard(${r.leg})">
      <div class="leg-badge">STAGE ${r.leg}</div>
      ${isActive ? '<div class="active-dot"></div>' : ''}
      <div class="runner-summary">
        <div class="name ${r.name ? '' : 'empty'}">${nameDisplay}</div>
        <div class="meta">${metaStr}</div>
      </div>
      <div class="chevron">▾</div>
    </div>
    <div class="runner-card-body">
      <div class="field-row">
        <div class="field">
          <label>Runner Name</label>
          <input type="text" id="name-${r.leg}" value="${esc(r.name)}" placeholder="Full name" />
        </div>
      </div>
      <div class="photo-upload-row">
        <div class="photo-preview" id="preview-${r.leg}">
          ${r.photo ? '<img src="' + esc(r.photo) + '" alt="Runner photo" />' : '<div class="no-photo">No Photo</div>'}
        </div>
        <div class="photo-buttons">
          <label class="btn-photo" for="camera-${r.leg}">📷 Take Photo</label>
          <input type="file" accept="image/*" capture="environment" id="camera-${r.leg}" 
                 onchange="handlePhoto(${r.leg}, this)" style="display:none" />
          <label class="btn-photo" for="gallery-${r.leg}">🖼 Choose Photo</label>
          <input type="file" accept="image/*" id="gallery-${r.leg}" 
                 onchange="handlePhoto(${r.leg}, this)" style="display:none" />
          <div class="photo-status" id="photo-status-${r.leg}"></div>
        </div>
        <input type="hidden" id="photo-${r.leg}" value="${esc(r.photo)}" />
        <input type="hidden" id="photodata-${r.leg}" value="" />
      </div>
      <div class="field-row">
        <div class="field">
          <label>Distance</label>
          <input type="text" id="distance-${r.leg}" value="${esc(r.distance)}" placeholder="e.g. 5.2 mi" />
        </div>
        <div class="field">
          <label>Difficulty (1–20)</label>
          <input type="number" id="difficulty-${r.leg}" value="${r.difficulty}" min="1" max="20" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Run Time</label>
          <input type="text" id="time-${r.leg}" value="${esc(r.time)}" placeholder="e.g. 42:15" />
        </div>
        <div class="field">
          <label>Start Time</label>
          <input type="text" id="start-${r.leg}" value="${esc(r.start)}" placeholder="e.g. 3:45 PM PDT" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Years of Service</label>
          <input type="text" id="years-${r.leg}" value="${esc(r.years)}" placeholder="e.g. 12" />
        </div>
      </div>
      <div class="field-row" style="align-items:center">
        <label class="halfway-check">
          <input type="checkbox" id="halfway-${r.leg}" ${r.halfway ? 'checked' : ''} />
          <span>Halfway Point Reached</span>
        </label>
      </div>
      <div class="actions-row">
        <button class="btn-save" id="save-${r.leg}" onclick="saveRunner(${r.leg})">Save Leg ${r.leg}</button>
        <button class="btn-set-active ${isActive ? 'is-active' : ''}" onclick="setActive(${r.leg})">
          ${isActive ? '● Running' : 'Set Active'}
        </button>
      </div>
    </div>
  </div>`;
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function toggleCard(leg) {
  openCard = openCard === leg ? null : leg;
  renderAdmin();
  if (openCard) {
    setTimeout(() => {
      document.getElementById('card-' + leg)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

function handlePhoto(leg, input) {
  const file = input.files[0];
  if (!file) return;
  
  const status = document.getElementById('photo-status-' + leg);
  status.textContent = 'Processing...';
  
  // Resize image before converting to base64 (keep under 1MB for Apps Script)
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const MAX = 400; // max dimension — keep small for sheet storage
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
      else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      
      const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
      
      // Update preview
      document.getElementById('preview-' + leg).innerHTML = 
        '<img src="' + dataUrl + '" alt="Preview" />';
      
      // Store base64 for upload on save
      document.getElementById('photodata-' + leg).value = dataUrl;
      status.textContent = 'Ready to upload on save';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveRunner(leg) {
  const btn = document.getElementById('save-' + leg);
  btn.disabled = true;
  btn.textContent = 'Saving...';
  
  const photoData = document.getElementById('photodata-' + leg).value;
  
  const payload = {
    pin: PIN,
    leg: leg,
    name:       document.getElementById('name-' + leg).value,
    photo:      document.getElementById('photo-' + leg).value,
    distance:   document.getElementById('distance-' + leg).value,
    difficulty: parseInt(document.getElementById('difficulty-' + leg).value) || 5,
    time:       document.getElementById('time-' + leg).value,
    start:      document.getElementById('start-' + leg).value,
    years:      document.getElementById('years-' + leg).value,
    halfway:    document.getElementById('halfway-' + leg).checked
  };
  
  // Include photo data if a new photo was selected
  if (photoData) {
    payload.photoData = photoData;
    btn.textContent = 'Uploading photo...';
  }

  try {
    const result = await postJSON(payload);
    
    if (result.status === 'error') {
      btn.disabled = false;
      btn.textContent = 'Save Stage ' + leg;
      showToast(result.message, 'error');
      if (result.message === 'Invalid PIN') renderPinGate(true);
      return;
    }
    
    // Update local state
    const runner = runners.find(r => r.leg === leg);
    if (runner) {
      runner.name = payload.name;
      // If server returned a new photo URL (from upload), use it
      if (result.photoUrl) {
        runner.photo = result.photoUrl;
      } else {
        runner.photo = payload.photo;
      }
      runner.distance = payload.distance;
      runner.difficulty = payload.difficulty;
      runner.time = payload.time;
      runner.start = payload.start;
      runner.years = payload.years;
    }
    
    // Clear the pending photo data
    const pdEl = document.getElementById('photodata-' + leg);
    if (pdEl) pdEl.value = '';
    
    btn.textContent = 'Saved ✓';
    btn.classList.add('saved');
    showToast('Stage ' + leg + ' saved');
    
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = 'Save Stage ' + leg;
      btn.classList.remove('saved');
      renderAdmin();
    }, 1500);
    
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Save Stage ' + leg;
    showToast('Save failed — ' + err.message, 'error');
  }
}

async function setActive(leg) {
  const payload = {
    pin: PIN,
    leg: leg,
    setActive: true
  };

  try {
    const result = await postJSON(payload);
    
    if (result.status === 'error') {
      showToast(result.message, 'error');
      if (result.message === 'Invalid PIN') renderPinGate(true);
      return;
    }
    
    // Update local state
    runners.forEach(r => r.active = false);
    const runner = runners.find(r => r.leg === leg);
    if (runner) runner.active = true;
    
    showToast('Stage ' + leg + ' is now active');
    renderAdmin();
    
  } catch (err) {
    showToast('Failed to set active — ' + err.message, 'error');
  }
}

// ── Init ──
renderPinGate();
</script>
</body>
</html>
