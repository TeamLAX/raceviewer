<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeamLAX | Secret B2V Route Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400..900&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; font-family:'Lexend Deca',sans-serif; background:#080604; color:#fff; overflow:hidden; }
    h1,h2,.stage-num,.elev-num { font-family:'Gabarito',sans-serif; }

    #app { height:100%; display:flex; }

    /* ── Sidebar ── */
    .sb { width:360px; min-width:300px; background:linear-gradient(180deg,#110b06 0%,#080503 100%); border-right:1px solid rgba(245,158,11,0.12); display:flex; flex-direction:column; overflow:hidden; z-index:10; }
    .sb-hdr { padding:16px 18px 12px; border-bottom:1px solid rgba(255,255,255,0.05); flex-shrink:0; }
    .sb-hdr .logo-row { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .sb-hdr .logo-row img { width:52px; height:52px; border-radius:8px; }
    .sb-hdr h1 { font-size:1.15rem; font-weight:800; text-transform:uppercase; letter-spacing:0.04em; line-height:1.15; }
    .sb-hdr h1 span { color:#f59e0b; }
    .sb-hdr .classified { display:inline-block; background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; font-size:0.55rem; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; padding:2px 8px; border-radius:4px; margin-top:4px; }
    .sb-hdr .race-stats { display:flex; gap:8px; margin-top:10px; }
    .sb-hdr .rs { background:rgba(245,158,11,0.06); border:1px solid rgba(245,158,11,0.1); border-radius:6px; padding:4px 8px; flex:1; text-align:center; }
    .sb-hdr .rs .v { font-family:'Gabarito',sans-serif; font-size:0.95rem; font-weight:700; color:#f59e0b; }
    .sb-hdr .rs .l { font-size:0.5rem; text-transform:uppercase; letter-spacing:0.06em; color:rgba(255,255,255,0.35); margin-top:1px; }

    /* Stage list */
    .sl { flex:1; overflow-y:auto; padding:4px 0; scrollbar-width:thin; scrollbar-color:rgba(245,158,11,0.25) transparent; }
    .sl::-webkit-scrollbar { width:4px; }
    .sl::-webkit-scrollbar-thumb { background:rgba(245,158,11,0.25); border-radius:4px; }

    .si { display:flex; align-items:center; gap:8px; padding:6px 16px; cursor:pointer; transition:background 0.12s; border-left:3px solid transparent; }
    .si:hover { background:rgba(245,158,11,0.05); }
    .si.active { background:rgba(245,158,11,0.08); border-left-color:#f59e0b; }

    .sm { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Gabarito',sans-serif; font-weight:800; font-size:0.55rem; flex-shrink:0; }
    .sm.start { background:#16a34a; color:#fff; border:2px solid #22c55e; }
    .sm.mid { background:rgba(245,158,11,0.12); color:#f59e0b; border:2px solid rgba(245,158,11,0.25); }
    .sm.fin { background:#dc2626; color:#fff; border:2px solid #ef4444; }

    .si-info { flex:1; min-width:0; }
    .si-top { display:flex; align-items:baseline; gap:5px; }
    .si-stg { font-size:0.55rem; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:0.06em; flex-shrink:0; }
    .si-name { font-weight:600; font-size:0.8rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .si-dist { font-size:0.65rem; color:#f59e0b; font-weight:600; flex-shrink:0; }
    .si-terr { font-size:0.58rem; color:rgba(255,255,255,0.3); margin-top:1px; }
    .si-elev { font-size:0.58rem; color:rgba(255,255,255,0.25); text-align:right; flex-shrink:0; min-width:40px; }

    /* ── Map ── */
    .mw { flex:1; position:relative; }
    #map { height:100%; width:100%; }
    .leaflet-popup-content-wrapper { border-radius:10px !important; }

    /* Popup */
    .sp { font-family:'Lexend Deca',sans-serif; min-width:200px; }
    .sp h3 { font-family:'Gabarito',sans-serif; font-size:1rem; margin-bottom:4px; color:#1a0f08; }
    .sp .runner-name { font-size:0.75rem; color:#92400e; font-weight:600; margin-bottom:6px; }
    .sp .stats { display:flex; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
    .sp .st { background:#fef3c7; border-radius:4px; padding:2px 6px; font-size:0.65rem; font-weight:600; color:#92400e; }
    .sp .desc { font-size:0.68rem; color:#555; line-height:1.35; }
    .sp .gps { font-size:0.55rem; color:#999; margin-top:3px; font-family:monospace; }

    /* Tile sel */
    .ts { position:absolute; top:10px; right:10px; z-index:1000; display:flex; gap:3px; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); border-radius:6px; padding:3px; }
    .tb { border:none; background:transparent; color:rgba(255,255,255,0.5); font-family:'Lexend Deca',sans-serif; font-size:0.6rem; padding:4px 8px; border-radius:4px; cursor:pointer; transition:all 0.12s; }
    .tb:hover { color:#fff; background:rgba(255,255,255,0.08); }
    .tb.on { background:#f59e0b; color:#1a0f08; font-weight:600; }

    /* Elev bar */
    .eb { position:absolute; bottom:0; left:0; right:0; height:90px; background:linear-gradient(0deg,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.35) 70%,transparent 100%); z-index:800; display:flex; align-items:flex-end; padding:0 16px 8px; gap:2px; pointer-events:none; }
    .ec { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; pointer-events:auto; cursor:pointer; position:relative; }
    .ef { width:100%; border-radius:2px 2px 0 0; transition:all 0.2s; min-height:3px; }
    .ec:hover .ef { filter:brightness(1.3); }
    .en { font-family:'Gabarito',sans-serif; font-size:0.5rem; color:rgba(255,255,255,0.4); line-height:1; }
    .ec:hover .en { color:#f59e0b; }
    .et { display:none; position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.9); border:1px solid rgba(245,158,11,0.25); border-radius:5px; padding:4px 7px; white-space:nowrap; font-size:0.55rem; color:#fff; margin-bottom:3px; pointer-events:none; }
    .ec:hover .et { display:block; }

    /* Legend */
    .lg { position:absolute; bottom:100px; left:10px; z-index:800; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); border-radius:6px; padding:8px 12px; font-size:0.58rem; color:rgba(255,255,255,0.6); display:flex; flex-direction:column; gap:4px; }
    .lr { display:flex; align-items:center; gap:6px; }
    .ll { width:20px; height:3px; border-radius:2px; flex-shrink:0; }

    @media(max-width:768px){
      #app{flex-direction:column}
      .sb{width:100%;min-width:unset;max-height:40vh;border-right:none;border-bottom:1px solid rgba(245,158,11,0.12)}
      .mw{min-height:60vh}
      .eb{height:60px}
    }
  </style>
</head>
<body>
<div id="app">
  <div class="sb">
    <div class="sb-hdr">
      <div class="logo-row">
        <img id="logoImg" src="" alt="LAX B2V" />
        <div>
          <h1>Team<span>LAX</span> B2V<br>Secret Route Map</h1>
          <div class="classified">🔒 Highly Classified</div>
        </div>
      </div>
      <div class="race-stats">
        <div class="rs"><div class="v">120.4</div><div class="l">Total Miles</div></div>
        <div class="rs"><div class="v">20</div><div class="l">Stages</div></div>
        <div class="rs"><div class="v">5,495'</div><div class="l">Peak Elev</div></div>
      </div>
      <div id="smLiveViewers" style="font-size:0.5rem;color:rgba(255,255,255,0.45);margin-top:6px;text-align:right;transition:color 0.5s"></div>
    </div>
    <div class="sl" id="stageList"></div>
  </div>
  <div class="mw">
    <div id="map"></div>
    <div class="ts" id="tileSel"></div>
    <div class="lg">
      <div class="lr"><div class="ll" style="background:#16a34a"></div>Start</div>
      <div class="lr"><div class="ll" style="background:#f59e0b"></div>Race Route</div>
      <div class="lr"><div class="ll" style="background:#ef4444"></div>Finish</div>
      <div class="lr"><div class="ll" style="background:#06b6d4;height:1px;border-top:1px dashed #06b6d4"></div>CA/NV Line</div>
    </div>
    <div class="eb" id="elevBar"></div>
  </div>
</div>

  b.className = 'tb' + (n===curTile?' on':'');

  b.onclick = () => { map.removeLayer(tiles[curTile]); curTile=n; tiles[n].addTo(map); tSel.querySelectorAll('.tb').forEach(x=>x.classList.remove('on')); b.classList.add('on'); };
  tSel.appendChild(b);
});

/* ── Draw Route ── */
L.polyline(fullRoute, { color:'#000', weight:7, opacity:0.35, lineCap:'round', lineJoin:'round' }).addTo(map);
L.polyline(fullRoute, { color:'#f59e0b', weight:4, opacity:0.85, lineCap:'round', lineJoin:'round' }).addTo(map);

// State line
L.polyline([[stateLineLat,-116.30],[stateLineLat,-115.10]], { color:'#06b6d4', weight:1.5, opacity:0.4, dashArray:'8,6' }).addTo(map);
L.marker([stateLineLat,-116.14], { icon:L.divIcon({ className:'', html:'<div style="font:10px Gabarito,sans-serif;color:#06b6d4;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.9)">CA │ NV</div>', iconAnchor:[20,6] }) }).addTo(map);

/* ── Stage Markers ── */
const mks = [];
for (let i=1;i<=21;i++){
  const s = stages[i]; if(!s) continue;
  const iS=i===1, iF=i===21;
  const bg = iS?'#16a34a':iF?'#dc2626':'rgba(20,12,6,0.85)';
  const bc = iS?'#22c55e':iF?'#ef4444':'#f59e0b';
  const tc = (iS||iF)?'#fff':'#f59e0b';
  const sz = (iS||iF)?28:20;
  const fs = iF?'11px':iS?'11px':'8px';
  const lb = iF?'🏁':String(i);
  const mk = L.marker([s.lat,s.lng],{
    icon: L.divIcon({ className:'', html:`<div style="background:${bg};color:${tc};font:${fs} Gabarito,sans-serif;font-weight:800;width:${sz}px;height:${sz}px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid ${bc};box-shadow:0 2px 6px rgba(0,0,0,.5);cursor:pointer">${lb}</div>`, iconSize:[sz,sz], iconAnchor:[sz/2,sz/2] }),
    zIndexOffset:(iS||iF)?1000:0
  }).addTo(map);
  mk.bindPopup(`<div class="sp"><h3>${iF?'🏁 Finish':i+'. '+s.diff}</h3><div class="runner-name">${iF?'':runnerNames[i]}</div><div class="stats"><span class="st">${s.dist}</span><span class="st">${s.elev}'</span>${s.difficulty?'<span class="st">Rank #'+s.difficulty+'</span>':''}</div><div class="desc">${s.desc}</div><div class="gps">${s.gps}</div></div>`,{maxWidth:280});
  mks.push(mk);
}

map.fitBounds(L.polyline(fullRoute).getBounds(),{padding:[40,40]});

/* ── Sidebar ── */
const sList = document.getElementById('stageList');
function buildSidebar(){
  sList.innerHTML = '';
  for(let i=1;i<=21;i++){
    const s=stages[i]; if(!s) continue;
    const iS=i===1,iF=i===21;
    const d = document.createElement('div');
    d.className='si'; d.dataset.leg=i;
    const mc = iS?'start':iF?'fin':'mid';
    const lb = iF?'🏁':String(i);
    const nm = iF?'Finish — Rio Hotel':runnerNames[i];
    d.innerHTML=`<div class="sm ${mc}">${lb}</div><div class="si-info"><div class="si-top"><span class="si-stg">${iF?'':'S'+i}</span><span class="si-name">${nm}</span><span class="si-dist">${s.dist}</span></div><div class="si-terr">${s.diff}</div></div><div class="si-elev">${typeof s.elev==='number'?s.elev.toLocaleString()+"'":''}</div>`;
    d.onclick=()=>flyTo(i);
    sList.appendChild(d);
  }
}
buildSidebar();

function flyTo(leg){
  const s=stages[leg]; if(!s) return;
  document.querySelectorAll('.si').forEach(e=>e.classList.remove('active'));
  const a=document.querySelector(`.si[data-leg="${leg}"]`);
  if(a){a.classList.add('active');a.scrollIntoView({behavior:'smooth',block:'nearest'});}
  map.flyTo([s.lat,s.lng],leg===21?15:leg>=18?14:13,{duration:1});
  setTimeout(()=>{if(mks[leg-1])mks[leg-1].openPopup();},1100);
}

/* ── Elevation Bar ── */
const eBar = document.getElementById('elevBar');
const maxE=5495, minE=474, eR=maxE-minE;
for(let i=1;i<=20;i++){
  const s=stages[i]; if(!s) continue;
  const avg=(s.elev+s.elevEnd)/2;
  const pct=((avg-minE)/eR)*100;
  const h=Math.max(6,pct*0.6);
  const hue=40-(pct/100)*40;
  const c=document.createElement('div'); c.className='ec'; c.onclick=()=>flyTo(i);
  c.innerHTML=`<div class="et">${runnerNames[i]}<br>S${i}: ${s.dist} · ${s.elev.toLocaleString()}'→${s.elevEnd.toLocaleString()}' · ${s.diff}</div><div class="ef" style="height:${h}px;background:hsl(${hue},75%,48%)"></div><div class="en">${i}</div>`;
  eBar.appendChild(c);
}

/* ── Fetch Runner Names from API ── */
function fetchNames(){
  const cb='_b2v_map_'+Date.now();
  window[cb]=function(data){
    delete window[cb];
    const sc=document.getElementById(cb); if(sc)sc.remove();
    if(data&&data.status==='ok'&&data.runners&&data.runners.length){
      data.runners.forEach(r=>{if(r.leg&&r.name)runnerNames[r.leg]=r.name;});
      buildSidebar();
      // Update popups
      mks.forEach((mk,idx)=>{
        const i=idx+1,s=stages[i]; if(!s||i===21)return;
        mk.setPopupContent(`<div class="sp"><h3>${i+'. '+s.diff}</h3><div class="runner-name">${runnerNames[i]}</div><div class="stats"><span class="st">${s.dist}</span><span class="st">${s.elev}'</span>${s.difficulty?'<span class="st">Rank #'+s.difficulty+'</span>':''}</div><div class="desc">${s.desc}</div><div class="gps">${s.gps}</div></div>`);
      });
      // Update elev tooltips
      document.querySelectorAll('.ec .et').forEach((el,idx)=>{
        const i=idx+1,s=stages[i]; if(!s)return;
        el.innerHTML=`${runnerNames[i]}<br>S${i}: ${s.dist} · ${s.elev.toLocaleString()}'→${s.elevEnd.toLocaleString()}' · ${s.diff}`;
      });
    }
  };
  const sc=document.createElement('script');
  sc.id=cb; sc.src=API_URL+'?callback='+cb+'&t='+Date.now();
  sc.onerror=()=>{delete window[cb];sc.remove();};
  document.head.appendChild(sc);
}
fetchNames();

// Live viewer heartbeat
(function(){
  var ip=null;
  fetch('https://api.ipify.org?format=json')
    .then(function(r){return r.json()})
    .then(function(d){ip=d.ip||'unknown';beat()})
    .catch(function(){ip='unknown';beat()});
  function beat(){
    var cb='_shb_'+Date.now();
    window[cb]=function(data){
      delete window[cb];var sc=document.getElementById(cb);if(sc)sc.remove();
      var el=document.getElementById('smLiveViewers');
      if(el&&data){var l=data.live||0,t=data.unique||0;if(l>0||t>0){el.textContent='VIEWS: '+l+' active | '+t+' total';el.style.color='rgba(255,255,255,0.55)';}}
    };
    var sc=document.createElement('script');sc.id=cb;
    sc.src=API_URL+'?action=heartbeat&ip='+(ip||'')+'&page=secretmap&ua='+encodeURIComponent(navigator.userAgent.substring(0,200))+'&callback='+cb+'&t='+Date.now();
    sc.onerror=function(){delete window[cb];sc.remove()};
    document.head.appendChild(sc);
  }
  setInterval(beat,30000);
})();
</script>
</body>
</html>
