<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamLAX 2026 — Secret B2V Route Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: linear-gradient(135deg, #0d1b2a 0%, #1b2d45 100%);
    border-bottom: 3px solid #ff4136;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .header img {
    height: 56px;
    width: auto;
    filter: drop-shadow(0 0 6px rgba(255,200,0,0.4));
  }

  .header .text-group { text-align: center; }

  .header h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 22px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #ffffff;
  }

  .header h1 span { color: #ff4136; }

  .header .subtitle {
    font-size: 12px;
    color: #8899aa;
    letter-spacing: 1px;
  }

  #map { flex: 1; width: 100%; }

  /* Hide the routing machine's default UI */
  .leaflet-routing-container { display: none !important; }

  .stage-popup .stage-name {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #1b2d45;
    margin-bottom: 4px;
  }

  .stage-popup .stage-detail {
    font-size: 13px;
    color: #444;
    line-height: 1.5;
  }

  .stage-popup .difficulty {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 3px;
    font-weight: 600;
    font-size: 12px;
    margin-top: 4px;
  }

  .diff-hard { background: #ff4136; color: #fff; }
  .diff-med  { background: #ff851b; color: #fff; }
  .diff-easy { background: #2ecc40; color: #fff; }

  .legend {
    position: absolute;
    bottom: 24px;
    left: 12px;
    background: rgba(0, 0, 0, 0.8);
    border: 1px solid rgba(0,255,255,0.4);
    border-radius: 6px;
    padding: 12px 16px;
    z-index: 1000;
    font-size: 12px;
    color: #ddd;
    backdrop-filter: blur(6px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .legend h4 {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    color: #ff4136;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 3px;
  }

  .legend-swatch {
    width: 24px; height: 4px; border-radius: 2px; flex-shrink: 0;
  }

  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0; border: 2px solid #fff;
  }

  .stage-marker {
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    background: #1b2d45; border: 3px solid #00bfff;
    color: #fff; font-family: 'Oswald', sans-serif;
    font-weight: 700; font-size: 12px;
    text-align: center; line-height: 1;
    box-shadow: 0 0 8px rgba(0,191,255,0.5);
  }

  .start-marker {
    background: #2ecc40; border-color: #fff;
    font-size: 8px; width: 36px; height: 36px;
    box-shadow: 0 0 12px rgba(46,204,64,0.6);
    letter-spacing: 0.5px;
  }

  .finish-marker {
    background: #ff4136; border-color: #fff;
    font-size: 8px; width: 36px; height: 36px;
    box-shadow: 0 0 12px rgba(255,65,54,0.6);
    letter-spacing: 0.5px;
  }

  .leaflet-popup-content-wrapper {
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  .loading-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 2000;
    display: flex; align-items: center; justify-content: center;
    color: #00ffff; font-family: 'Oswald', sans-serif;
    font-size: 18px; letter-spacing: 2px;
    text-transform: uppercase;
  }

  .loading-overlay.hidden { display: none; }
</style>
</head>

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19, opacity: 0.7
}).addTo(map);

// Place names
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19, opacity: 0.8
}).addTo(map);

// Build waypoints array for the routing engine
// We include all stage points PLUS critical intermediate turn points
// from the course description to force the router onto the correct roads
const waypoints = [
  // START
  L.latLng(35.582, -116.22105),
  // Stage 2
  L.latLng(35.63272, -116.29048),
  // Stage 3
  L.latLng(35.68953, -116.30238),
  // Stage 4
  L.latLng(35.74935, -116.31543),
  // Stage 5
  L.latLng(35.81552, -116.33015),
  // Stage 6
  L.latLng(35.87695, -116.26778),
  // Stage 7 - near Shoshone, turn onto Hwy 178
  L.latLng(35.96145, -116.2679),
  // Force through Shoshone intersection (Hwy 127 & 178)
  L.latLng(35.9726, -116.2717),
  // Stage 8 - Chicago Valley Rd on Hwy 178
  L.latLng(36.00098, -116.19802),
  // Stage 9 - past CA/NV state line
  L.latLng(36.09523, -116.18397),
  // Stage 10 - into Pahrump
  L.latLng(36.16825, -116.10282),
  // Stage 11 - Hwy 372 at Blagg Rd
  L.latLng(36.205, -116.01242),
  // Force turn onto Hwy 160 in Pahrump
  L.latLng(36.2085, -115.9935),
  // Stage 12 - east of Pahrump on Hwy 160
  L.latLng(36.17638, -115.93198),
  // Stage 13
  L.latLng(36.13272, -115.86677),
  // Stage 14
  L.latLng(36.07305, -115.76897),
  // Stage 15 - approaching Mountain Springs summit
  L.latLng(36.00595, -115.60615),
  // Stage 16 - Mountain Springs summit
  L.latLng(36.01288, -115.49937),
  // Stage 17 - descending Hwy 160
  L.latLng(36.01417, -115.42355),
  // Stage 18 - Blue Diamond Rd & El Capitan Way
  L.latLng(36.02083, -115.28833),
  // Force north on Fort Apache Rd
  L.latLng(36.0620, -115.2962),
  // Stage 19 - 4670 S Fort Apache
  L.latLng(36.1046, -115.2969),
  // Force turn: north on Fort Apache to Desert Inn
  L.latLng(36.1260, -115.2970),
  // Force turn: east on Desert Inn Rd
  L.latLng(36.1260, -115.2500),
  // Stage 20 - Desert Inn & Jones
  L.latLng(36.129, -115.227),
  // Force: continue east on Desert Inn to Valley View
  L.latLng(36.1285, -115.2085),
  // Force turn: south on Valley View Blvd
  L.latLng(36.1225, -115.2075),
  // Force turn: east on Twain Ave
  L.latLng(36.1215, -115.1950),
  // Force turn: south on S Hotel Rio Dr
  L.latLng(36.1195, -115.1880),
  // FINISH - Rio Hotel
  L.latLng(36.1187, -115.1867)
];

// Use Leaflet Routing Machine with OSRM to snap to roads
const routingControl = L.Routing.control({
  waypoints: waypoints,
  router: L.Routing.osrmv1({
    serviceUrl: 'https://router.project-osrm.org/route/v1',
    profile: 'car'
  }),
  routeWhileDragging: false,
  addWaypoints: false,
  draggableWaypoints: false,
  fitSelectedRoutes: true,
  show: false,
  createMarker: function() { return null; }, // We add our own markers
  lineOptions: {
    styles: [
      // Glow
      { color: '#ffff00', opacity: 0.35, weight: 14 },
      // Main line
      { color: '#00ffff', opacity: 1, weight: 5 }
    ],
    addWaypoints: false
  }
}).addTo(map);

// When route is found, hide loading and fit bounds
routingControl.on('routesfound', function(e) {
  document.getElementById('loading').classList.add('hidden');
  const bounds = L.latLngBounds(stages.map(s => [s.lat, s.lng]));
  map.fitBounds(bounds.pad(0.06));
});

routingControl.on('routingerror', function(e) {
  document.getElementById('loading').textContent = 'Route loading failed — showing straight-line fallback';
  // Fallback: draw straight lines
  const fallbackCoords = stages.map(s => [s.lat, s.lng]);
  L.polyline(fallbackCoords, { color: '#ffff00', weight: 14, opacity: 0.35 }).addTo(map);
  L.polyline(fallbackCoords, { color: '#00ffff', weight: 5, opacity: 1 }).addTo(map);
  map.fitBounds(L.latLngBounds(fallbackCoords).pad(0.06));
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 3000);
});

// Add stage markers (these are our custom markers, independent of routing)
stages.forEach(s => {
  let cssClass = 'stage-marker';
  let label = s.id;
  if (s.id === 'START') { cssClass += ' start-marker'; label = 'START'; }
  else if (s.id === 'FINISH') { cssClass += ' finish-marker'; label = 'FIN'; }

  const icon = L.divIcon({
    className: '',
    html: '<div class="' + cssClass + '">' + label + '</div>',
    iconSize: s.id === 'START' || s.id === 'FINISH' ? [36, 36] : [28, 28],
    iconAnchor: s.id === 'START' || s.id === 'FINISH' ? [18, 18] : [14, 14]
  });

  const diffLabel = s.diff
    ? (function() {
        const cls = s.diff <= 5 ? 'diff-hard' : s.diff <= 12 ? 'diff-med' : 'diff-easy';
        return '<span class="difficulty ' + cls + '">Difficulty ' + s.diff + '/20</span>';
      })()
    : '';

  const titleText = s.id === 'START' ? 'Start Line'
    : s.id === 'FINISH' ? 'Finish — Rio Hotel & Casino'
    : 'Stage ' + s.id + ' — ' + s.dist;

  const popup =
    '<div class="stage-popup">' +
      '<div class="stage-name">' + titleText + '</div>' +
      '<div class="stage-detail">' +
        '<strong>Elev:</strong> ' + s.elev + '<br>' +
        s.notes + '<br>' +
        diffLabel +
      '</div>' +
    '</div>';

  L.marker([s.lat, s.lng], { icon: icon })
    .addTo(map)
    .bindPopup(popup, { maxWidth: 260 });
});
</script>

</body>
</html>
